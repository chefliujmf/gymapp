# gymapp — gymmingapp.duckdns.org
# Serves the built PWA over HTTPS and reverse-proxies intervals.icu (replacing the
# dev-only vite /icu proxy). Adjust the ssl_certificate paths + root to your box.
# On Home Assistant the DuckDNS add-on writes the cert to /ssl/.

server {
    listen 80;
    listen [::]:80;
    server_name gymmingapp.duckdns.org;
    return 301 https://$host$request_uri;          # force HTTPS (needed for Web Bluetooth)
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name gymmingapp.duckdns.org;

    ssl_certificate     /ssl/fullchain.pem;        # HA DuckDNS add-on path (or /etc/letsencrypt/live/.../fullchain.pem)
    ssl_certificate_key /ssl/privkey.pem;

    root /var/www/gymapp;                          # the contents of dist/
    index index.html;

    # SPA routing — every unknown path serves the app shell.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # The shell + service worker must not be cached stale (so updates land).
    location = /index.html      { add_header Cache-Control "no-cache"; }
    location = /sw.js           { add_header Cache-Control "no-cache"; }
    location = /registerSW.js   { add_header Cache-Control "no-cache"; }

    # Hashed assets are immutable.
    location /assets/ { add_header Cache-Control "public, max-age=31536000, immutable"; }

    # intervals.icu reverse proxy (the app calls /icu/api/v1/... with Basic auth).
    location /icu/ {
        proxy_pass https://intervals.icu/;
        proxy_ssl_server_name on;
        proxy_set_header Host intervals.icu;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Accept-Encoding "";
        proxy_read_timeout 30s;
    }
}
