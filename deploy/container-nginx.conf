# gymapp container (nginx:alpine) — serves the PWA + proxies intervals.icu.
# Fully isolated; NPM reverse-proxies gymmingapp.duckdns.org -> this container.
server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Login gate for the whole app (this is a public URL). /icu opts out below
    # because the intervals.icu key authenticates that path itself.
    auth_basic "gymapp";
    auth_basic_user_file /etc/nginx/.htpasswd;

    location / { try_files $uri $uri/ /index.html; }

    location = /index.html    { add_header Cache-Control "no-cache"; }
    location = /sw.js         { add_header Cache-Control "no-cache"; }
    location = /registerSW.js { add_header Cache-Control "no-cache"; }
    location /assets/ { add_header Cache-Control "public, max-age=31536000, immutable"; }

    # intervals.icu reverse proxy (app calls /icu/api/v1/... with Basic auth).
    # No login gate here: the intervals.icu key in the Authorization header is
    # the credential, and it must reach intervals.icu untouched.
    location /icu/ {
        auth_basic off;
        proxy_pass https://intervals.icu/;
        proxy_ssl_server_name on;
        proxy_set_header Host intervals.icu;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Accept-Encoding "";
    }
}
