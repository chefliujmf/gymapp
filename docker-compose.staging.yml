# Staging / QA stack — an isolated mirror of the DEV branch, served over HTTPS on
# the tailnet ONLY (tailscale serve -> 127.0.0.1:8089). Never public. Its own data
# (separate accounts/passkeys) and its own RP_ID, so it can't touch prod.
# Deployed by scripts/deploy-staging.sh (build dev -> push here -> up -> serve).
services:
  gymapp-staging:
    build:
      context: ./server
    image: gymapp-staging
    container_name: gymapp-staging
    restart: unless-stopped
    environment:
      CATALOG_DIR: /catalog
      # Coach chat: proxy to the host chat-helper (claude can't run in this Alpine
      # container). CHAT_HELPER_SECRET comes from auth.env.
      CHAT_HELPER_URL: http://host.docker.internal:8790
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      # RP_ID, ORIGIN, SEED_*, STRAVA_*, CHAT_HELPER_SECRET — on the box, NOT in the public repo.
      - "./auth.env"
    volumes:
      - "./dist:/usr/share/nginx/html:ro"
      - "/home/jmf/gymapp/media:/srv/media:ro"        # share prod's self-hosted media (ro)
      - "./data:/data"                                 # ISOLATED staging accounts/passkeys
      - "/home/jmf/content/generated:/catalog:ro"      # shared exercise catalog (ro)
    ports:
      - "8089:80"                                      # LAN+tailnet reachable so NPM (HA Green) can front it with HTTPS
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/auth/config >/dev/null 2>&1 || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 10s
