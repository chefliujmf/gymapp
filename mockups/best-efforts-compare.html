<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Season compare v2 — This vs a season you pick + Δ (#407)</title>
<style>
  :root{ --text:#eef1f4; --dim:#9298a6; --accent:#34e07d; --blue:#5aa9ff; --line:#252a34; }
  *{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  body{ background:#080a0d; color:var(--text); font:14px/1.4 -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; padding:14px; }
  .phone{ max-width:430px; margin:0 auto; }
  h1{ font-size:15px; font-weight:700; margin-bottom:3px; }
  .sub{ color:var(--dim); font-size:11.5px; margin-bottom:12px; }
  .sport{ display:flex; gap:6px; margin-bottom:14px; }
  .sport button{ flex:1; padding:9px; border:1px solid var(--line); background:#12151b; color:var(--dim); border-radius:10px; font-size:13px; font-weight:700; cursor:pointer; }
  .sport button.on{ background:var(--accent); color:#062; border-color:var(--accent); }
  .card{ background:linear-gradient(160deg,#21252f,#191c24); border:1px solid var(--line); border-radius:16px; padding:14px; margin-bottom:14px; }
  .ctitle{ font-size:13px; font-weight:700; margin-bottom:8px; }
  .insight{ color:var(--dim); font-size:11px; margin-top:9px; line-height:1.45; }
  .insight b{ color:var(--text); }
  .leg{ display:flex; gap:14px; font-size:10.5px; color:var(--dim); margin-bottom:2px; }
  .dot{ display:inline-block; width:9px; height:3px; border-radius:2px; margin-right:5px; vertical-align:middle; }
  /* the ONE changeable control — drives col 2 + the overlay */
  .cmp{ display:flex; flex-wrap:wrap; align-items:center; gap:6px; margin:11px 0 2px; }
  .cmp span{ color:var(--dim); font-size:11px; }
  .cmp button{ padding:6px 12px; border:1px solid var(--line); background:#12151b; color:var(--dim); border-radius:20px; font-size:11.5px; font-weight:600; cursor:pointer; }
  .cmp button.on{ background:#22303f; color:var(--blue); border-color:#2f4a63; }
  table{ border-collapse:collapse; width:100%; }
  th,td{ padding:7px 8px; text-align:right; white-space:nowrap; font-variant-numeric:tabular-nums; }
  thead th{ color:var(--dim); font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.02em; border-bottom:1px solid var(--line); }
  thead th.pick{ color:var(--blue); }
  thead th .car{ font-size:8px; }
  tbody td{ border-bottom:1px solid #1c2029; font-size:12.5px; }
  td.lbl{ text-align:left; font-weight:700; }
  .metricrow td.lbl{ color:var(--accent); } .metricrow td{ border-bottom:1px solid #171a21; }
  .best{ color:var(--blue); font-weight:800; }
  .wkg{ color:var(--dim); font-size:10px; }
  .rk{ color:var(--dim); }
  .cell2{ display:flex; flex-direction:column; align-items:flex-end; line-height:1.12; }
  .d-up{ color:var(--accent); font-weight:700; } .d-dn{ color:#ff7a7a; font-weight:700; } .d-eq{ color:var(--dim); }
  .mhead{ font-size:10px; color:var(--dim); text-transform:uppercase; letter-spacing:.04em; padding:9px 2px 3px; font-weight:700; text-align:left; }
</style>

<div class="phone">
  <h1>Season comparison <span style="color:var(--dim);font-weight:500">· v2</span></h1>
  <div class="sub">This season vs <b style="color:var(--text)">one season you pick</b> — with the gap (Δ). Same pick drives the curve.</div>
  <div class="sport">
    <button data-s="cyc" class="on">🚴 Cycling</button>
    <button data-s="run">🏃 Running</button>
  </div>

  <div class="card">
    <div class="ctitle" id="curveTitle">Power curve · overlay</div>
    <div class="leg"><span><span class="dot" style="background:var(--accent)"></span>This season</span><span><span class="dot" style="background:var(--blue)"></span><span id="legCmp">All time</span></span></div>
    <svg id="chart" viewBox="0 0 400 210" width="100%" preserveAspectRatio="none" style="display:block"></svg>
    <div class="insight" id="curveInsight"></div>
  </div>

  <div class="card">
    <div class="ctitle">Best efforts</div>
    <div class="cmp"><span>Compare season:</span>
      <button data-c="last">Last season</button>
      <button data-c="all" class="on">All time</button>
    </div>
    <table><thead id="thead"></thead><tbody id="tbody"></tbody></table>
    <div class="insight" id="tblInsight"></div>
  </div>
</div>

<script>
const W=74.4, wkg=w=>(w/W).toFixed(2), fmtT=s=>s==null?null:`${Math.floor(s/60)}:${String(Math.round(s%60)).padStart(2,'0')}`, paceKm=(t,d)=>fmtT(t/d*1000);
const cyc={ kind:'power',
  curveThis:[[5,837],[60,392],[300,310],[1200,229],[3600,213],[7200,168],[10800,149],[14400,128],[18000,123]],
  curveLast:[[5,966],[60,431],[300,310],[1200,246],[3600,213],[7200,177],[10800,149],[14400,128],[18000,123]],
  curveAll:[[5,1079],[60,448],[300,310],[1200,246],[3600,214],[7200,180],[10800,149],[14400,139],[18000,135],[21600,120],[28800,82]],
  xTicks:[[5,'5s'],[60,'1m'],[300,'5m'],[1200,'20m'],[3600,'1h'],[10800,'3h'],[28800,'8h']], yDom:[50,1120],
  rows:[['5s',[837,966,1079]],['60s',[392,431,448]],['5m',[310,310,310]],['20m',[229,246,246]],['1h',[213,213,214]],['2h',[168,177,180]],['3h',[149,149,149]],['4h',[128,128,139]],['5h',[123,123,135]],['6h',[null,null,120]],['8h',[null,null,82]]],
  metrics:[['FTP',[260,null,260],'W'],['CP',[null,null,248],'W'],["W′",[null,null,17.1],'kJ'],['MAP',[null,null,278],'W'],['VO₂max',[53.5,51,57],''],['TTE',[600,1080,780],'tte']],
  fmt:v=>v, sub:v=>wkg(v)+' w/kg', higher:true, du:'W',
  insight:'Your <b>5 s–1 min</b> is well down on all-time (837 vs 1079 W) — top-end faded; <b>5 min–3 h</b> match your PR. Aerobic engine intact, sprint isn\'t.',
  insightLast:'Vs <b>last season</b> you\'re a touch down almost everywhere (5 s −129 W, 20 min −17 W) — a lighter block so far, not a cliff.' };
const run={ kind:'pace',
  curveThis:[[400,96],[1000,279],[5000,1583],[10000,4040]], curveLast:[[400,96],[1000,279],[5000,1583],[10000,4040]], curveAll:[[5000,1392],[10000,3059]],
  xTicks:[[400,'400m'],[1000,'1k'],[5000,'5k'],[10000,'10k'],[21097,'half'],[42195,'M']], yDom:null,
  rows:[['400m',[96,96,null]],['1k',[279,279,null]],['5k',[1583,1583,1392]],['10k',[4040,4040,3059]],['half',[null,null,null]],['M',[null,null,null]]],
  metrics:[['Thresh',[297,null,null],'/km'],['Crit Sp',[321,null,315],'/km'],["D′",[null,null,148],'m'],['VO₂max',[50.5,null,52],'']],
  fmt:v=>fmtT(v), sub:(v,d)=>paceKm(v,d)+'/km', higher:false, du:'s', distFor:{'400m':400,'1k':1000,'5k':5000,'10k':10000,'half':21097,'M':42195},
  insight:'Only <b>5 k & 10 k</b> have clean all-time marks (23:12 · 50:59) — ~13 % off this season. 400 m/1 k all-time dropped (bad GPS). Race a fresh 5 k.',
  insightLast:'Last 12 months = this season\'s efforts — no fresh PRs yet. A hard 5 k or 1 k rep moves it.' };
let S=cyc, pick='all';
const pIdx=()=> pick==='all'?2:1;
const cmpCurve=()=> pick==='all'?S.curveAll:S.curveLast;

function drawCurve(){
  const pl={l:34,r:10,t:10,b:22}, w=400,h=210, pw=w-pl.l-pl.r, ph=h-pl.t-pl.b, lx=x=>Math.log(x);
  const xmin=lx(Math.min(...S.xTicks.map(t=>t[0]))), xmax=lx(Math.max(...S.xTicks.map(t=>t[0]))), X=x=>pl.l+(lx(x)-xmin)/(xmax-xmin)*pw;
  const both=S.curveThis.concat(cmpCurve()); let ymin,ymax;
  if(S.kind==='power'){ ymin=S.yDom[0]; ymax=S.yDom[1]; } else { const ps=both.map(p=>p[1]/p[0]*1000); ymin=Math.min(...ps); ymax=Math.max(...ps); const pad=(ymax-ymin)*.15||30; ymin-=pad; ymax+=pad; }
  const val=v=>S.kind==='power'?v[1]:(v[1]/v[0]*1000), Y=v=>pl.t+(1-(val(v)-ymin)/(ymax-ymin))*ph;
  const line=(d,c,wd)=>d.length?`<path d="${d.map((p,i)=>`${i?'L':'M'}${X(p[0]).toFixed(1)} ${Y(p).toFixed(1)}`).join(' ')}" fill="none" stroke="${c}" stroke-width="${wd}" stroke-linejoin="round"/>`+d.map(p=>`<circle cx="${X(p[0]).toFixed(1)}" cy="${Y(p).toFixed(1)}" r="2.4" fill="${c}"/>`).join(''):'';
  let g=`<line x1="${pl.l}" y1="${pl.t}" x2="${pl.l}" y2="${h-pl.b}" stroke="#333a45"/><line x1="${pl.l}" y1="${h-pl.b}" x2="${w-pl.r}" y2="${h-pl.b}" stroke="#333a45"/>`;
  g+=S.xTicks.map(t=>`<text x="${X(t[0]).toFixed(1)}" y="${h-8}" fill="#9298a6" font-size="8.5" text-anchor="middle">${t[1]}</text>`).join('');
  if(S.kind==='power') g+=[100,300,500,700,900,1100].map(v=>`<text x="${pl.l-4}" y="${(pl.t+(1-(v-ymin)/(ymax-ymin))*ph+3).toFixed(1)}" fill="#9298a6" font-size="8" text-anchor="end">${v}</text>`).join('');
  else { const lo=Math.ceil(ymin/30)*30, hi=Math.floor(ymax/30)*30; for(let v=lo;v<=hi;v+=30) g+=`<text x="${pl.l-4}" y="${(pl.t+(1-(v-ymin)/(ymax-ymin))*ph+3).toFixed(1)}" fill="#9298a6" font-size="8" text-anchor="end">${fmtT(v)}</text>`; }
  g+=line(cmpCurve(),'#5aa9ff',2)+line(S.curveThis,'#34e07d',2.4);
  document.getElementById('chart').innerHTML=g;
}
function deltaCell(a,b){ if(a==null||b==null) return '<span class="d-eq">—</span>';
  const better = S.higher? a-b : b-a; // >0 means This is better
  const raw = S.higher? a-b : b-a;
  const cls = raw>0?'d-up':raw<0?'d-dn':'d-eq';
  let txt; if(S.du==='W') txt=(raw>0?'+':'')+raw+'W'; else if(S.du==='s') txt=(raw>0?'+':'')+raw+'s'; else txt=(raw>0?'+':'')+(Math.round(raw*10)/10);
  return `<span class="${cls}">${raw===0?'0':txt}</span>`; }
function render(){
  const ci=pIdx(), pname = pick==='all'?'All time':'Last season';
  document.getElementById('thead').innerHTML=`<tr><th style="text-align:left">${S.kind==='power'?'Time':'Dist'}</th><th>This season</th><th class="pick">${pname} <span class="car">▾</span></th><th>Δ</th></tr>`;
  const durRow=([k,vals])=>{ const a=vals[0], b=vals[ci];
    const cell=(v)=> v==null?'<span class=rk>—</span>':`<div class="cell2"><span>${S.fmt(v)}</span><span class="wkg">${S.sub(v,S.distFor?S.distFor[k]:0)}</span></div>`;
    return `<tr><td class="lbl">${k}</td><td>${cell(a)}</td><td>${cell(b)}</td><td>${deltaCell(a,b)}</td></tr>`; };
  const rows=S.rows.map(durRow).join('');
  const metRow=([k,vals,u])=>{ const a=vals[0], b=vals[ci];
    const fmtM=(v)=> v==null?'<span class=rk>—</span>':(u==='tte'?fmtT(v):(u==='/km'?fmtT(v):v)+(u&&u!=='/km'&&u!=='tte'?' '+u:''))+(u==='/km'?' /km':'');
    let d='<span class="d-eq">—</span>'; if(a!=null&&b!=null){ const hi = u==='/km'? false : true; const raw = hi? a-b : b-a; const cls=raw>0?'d-up':raw<0?'d-dn':'d-eq'; d=`<span class="${cls}">${raw>0?'+':''}${Math.round(raw*10)/10}${u==='/km'?'s':(u==='W'||u==='kJ'||u==='m')?u:''}</span>`; }
    return `<tr class="metricrow"><td class="lbl">${k}</td><td>${fmtM(a)}</td><td>${fmtM(b)}</td><td>${d}</td></tr>`; };
  const mets=S.metrics.map(metRow).join('');
  document.getElementById('tbody').innerHTML=rows+`<tr><td class="mhead" colspan="4">Metrics</td></tr>`+mets;
  document.getElementById('curveTitle').textContent=(S.kind==='power'?'Power':'Pace')+' curve · overlay';
  document.getElementById('legCmp').textContent=pname;
  document.getElementById('curveInsight').innerHTML=pick==='all'?S.insight:S.insightLast;
  document.getElementById('tblInsight').innerHTML=`<b>Δ</b> = how far this season is from ${pname.toLowerCase()} (<span class="d-up">green</span> = at/above, <span class="d-dn">red</span> = below). Tap a season to change the middle column + the curve.`;
  drawCurve();
}
document.querySelectorAll('.sport button').forEach(b=>b.onclick=()=>{document.querySelectorAll('.sport button').forEach(x=>x.classList.remove('on'));b.classList.add('on');S=b.dataset.s==='cyc'?cyc:run;render();});
document.querySelectorAll('.cmp button').forEach(b=>b.onclick=()=>{document.querySelectorAll('.cmp button').forEach(x=>x.classList.remove('on'));b.classList.add('on');pick=b.dataset.c;render();});
const q=new URLSearchParams(location.search);
if(q.get('s')==='run'){S=run;document.querySelectorAll('.sport button').forEach(x=>x.classList.toggle('on',x.dataset.s==='run'));}
if(q.get('c')==='last'){pick='last';document.querySelectorAll('.cmp button').forEach(x=>x.classList.toggle('on',x.dataset.c==='last'));}
render();
</script>
