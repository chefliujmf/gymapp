<!doctype html><html><head><meta charset="utf8"><meta name="viewport" content="width=430">
<style>
:root{--text:#eef1f4;--text-dim:#9298a6;--accent:#34e07d;--bg:#0f1216;--line:#ffffff26}
*{box-sizing:border-box}
body{background:#0f1216;color:var(--text);font-family:-apple-system,system-ui,sans-serif;margin:0;padding:14px;max-width:430px}
h4{margin:24px 0 4px;font-size:12px;letter-spacing:.5px;text-transform:uppercase;color:var(--accent)}
.sub{color:var(--text-dim);font-size:11.5px;margin:0 0 8px;line-height:1.4}
.card{background:linear-gradient(#21252f,#191c24);border:1px solid #ffffff14;border-radius:14px;padding:14px;margin:8px 0}
.meta{color:var(--text-dim);font-size:12px;line-height:1.4}
.thumb{width:70px;height:70px;border-radius:12px;flex:none;overflow:hidden;background:#12151b;border:1px solid #ffffff12;padding:8px}
.bars{display:flex;align-items:flex-end;gap:3px;height:100%;width:100%}
.bars i{flex:1 1 0;border-radius:2px 2px 0 0;display:block}
/* coach insight line — the thing that was missing */
.ins-line{background:linear-gradient(90deg,#34e07d18,#34e07d05);border-left:3px solid var(--accent);padding:8px 11px;border-radius:0 9px 9px 0;font-size:12px;line-height:1.5;color:var(--text);margin:8px 0 4px}
.ins-line .tag{font-weight:800;color:var(--accent);margin-right:4px}
/* stats */
.sect{font-size:10px;letter-spacing:.5px;text-transform:uppercase;color:var(--text-dim);font-weight:700;margin:12px 2px 5px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.grid.g4{grid-template-columns:1fr 1fr 1fr 1fr}
.gt{background:radial-gradient(120% 120% at 50% 0%,#1d222b,#141821);border:1px solid #ffffff12;border-radius:12px;padding:11px 8px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:2px}
.gt b{font-size:17px;font-weight:800;line-height:1.1}
.gt span{font-size:9px;letter-spacing:.4px;text-transform:uppercase;color:var(--text-dim)}
/* B hero */
.hero{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.ht{background:radial-gradient(130% 130% at 50% 0%,#20303a,#141a22);border:1px solid #34e07d33;border-radius:14px;padding:14px 10px;text-align:center}
.ht b{font-size:24px;font-weight:800;display:block}
.ht span{font-size:10px;text-transform:uppercase;letter-spacing:.4px;color:var(--text-dim)}
.chiprow{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.mchip{background:#161a21;border:1px solid #ffffff12;border-radius:9px;padding:6px 10px;font-size:12px}
.mchip b{font-weight:800}.mchip span{color:var(--text-dim);margin-left:5px;font-size:11px}
/* C rows */
.rows{background:#141821;border:1px solid #ffffff10;border-radius:12px;overflow:hidden}
.rows .rh{font-size:9.5px;letter-spacing:.5px;text-transform:uppercase;color:var(--text-dim);font-weight:700;padding:9px 12px 4px;background:#11151c}
.rr{display:flex;justify-content:space-between;align-items:baseline;padding:8px 12px;border-top:1px solid #ffffff0a}
.rr span{color:var(--text-dim);font-size:12.5px}.rr b{font-size:14px;font-weight:800}
.tog{display:flex;gap:6px;margin:8px 0}
.tog button{flex:1;padding:8px 4px;border-radius:9px;border:1px solid #ffffff20;background:#161a21;color:var(--text-dim);font-weight:700;font-size:11.5px;cursor:pointer}
.tog button.on{border-color:var(--accent);color:var(--accent);background:#34e07d12}
/* chart */
.tcard{background:#161a21;border:1px solid #ffffff10;border-radius:12px;padding:10px 12px 8px;margin:8px 0}
.chd{display:flex;justify-content:space-between;align-items:baseline;gap:8px;margin-bottom:8px}
.chd .lbl{font-size:11px;font-weight:800;letter-spacing:.4px;text-transform:uppercase;color:var(--text)}
.chd .ins{font-size:11px;color:var(--text-dim);font-weight:600}
.chd .ins b{color:var(--text)}
.c2{display:grid;grid-template-columns:50px 1fr;grid-template-rows:1fr 18px;column-gap:8px}
.c2y{position:relative;grid-column:1;grid-row:1}
.c2y span{position:absolute;right:2px;transform:translateY(-50%);font-size:9.5px;font-weight:600;color:var(--text-dim);white-space:nowrap}
.c2p{grid-column:2;grid-row:1;position:relative}
.c2x{grid-column:2;grid-row:2;position:relative;font-size:10px;font-weight:600;color:var(--text-dim)}
.c2x span{position:absolute;transform:translateX(-50%);padding-top:4px;white-space:nowrap}
.c2x span.first{transform:none}.c2x span.last{transform:translateX(-100%)}
svg.tr{display:block;width:100%}
.gl{stroke:var(--line);stroke-width:.5;opacity:.5}.gv{opacity:.2}
.zbar{display:flex;height:14px;border-radius:7px;overflow:hidden;margin:8px 0 10px}
.zrow{display:flex;align-items:center;gap:8px;font-size:12.5px;padding:3px 0}
.zdot{width:10px;height:10px;border-radius:3px;flex:none}
.zrow b{margin-left:auto;font-variant-numeric:tabular-nums}.zrow .pct{color:var(--text-dim);width:38px;text-align:right}
</style></head><body>
<div id="app"></div>
<script>
const S={"n":4026,"dur":4165,"watts":[0,118,0,0,167,222,158,190,147,3,224,27,277,80,204,0,153,177,149,130,148,142,161,211,248,254,181,156,32,169,271,188,0,162,240,243,223,211,256,200,164,278,0,0,314,257,235,263,266,240,252,264,238,175,154,123,5,167,163,123,178,149,108,245,267,235,163,242,252,263,237,223,276,240,81,161,213,230,280,170,179,234,144,0,245,265,187,47,140,144,149,140,131,97,160,84,0,266,268,210,266,198,212,248,235,241,242,227,227,183,181,196,237,221,246,169,234,121,227,254,235,124,118,128,155,107,154,169,197,153,154,117,149,182,136,187,128,188,159,144,187,212,206,108,118,216,62,112,267,158,0,176,262,227,219,288,224,230,229,0],"hr":[96,119,118,98,98,118,131,144,143,125,127,130,134,148,141,143,135,140,142,141,139,140,139,137,147,154,159,156,152,146,156,159,162,154,156,160,162,161,163,163,164,165,159,139,123,135,149,161,164,168,167,168,169,168,162,157,149,148,147,144,140,143,144,154,162,164,165,163,165,169,169,169,167,171,168,161,158,161,163,162,164,157,160,145,151,159,165,167,161,127,135,140,140,139,139,133,129,140,150,157,161,165,164,164,165,166,166,166,168,168,166,166,164,165,167,166,166,166,164,164,166,158,147,143,143,143,139,139,145,148,142,139,137,144,143,144,147,147,147,148,142,145,147,149,138,132,137,136,141,151,147,135,137,146,153,159,165,163,169,166],"alt":[null,null,319,295,287,291,296,302,305,292,293,290,297,303,304,306,291,295,288,279,273,275,276,276,283,289,294,298,300,297,297,290,269,253,259,263,270,267,273,279,276,282,274,256,240,231,224,220,220,221,230,236,242,246,249,250,234,236,242,234,240,244,247,249,255,261,254,260,267,273,278,283,290,297,301,303,306,313,317,309,312,295,283,269,266,270,272,271,273,276,278,281,281,282,275,272,253,246,245,249,253,254,251,258,261,265,272,279,283,285,276,275,276,275,282,280,274,275,276,271,275,272,271,271,276,275,271,274,275,272,266,268,267,271,274,277,281,285,288,290,287,294,299,301,296,284,288,287,292,297,293,278,284,290,296,301,308,314,322,325],"cad":[null,33,0,0,89,72,91,79,96,97,88,102,80,49,94,46,99,97,97,96,92,95,85,81,63,69,102,103,70,100,87,104,0,77,64,86,93,100,50,95,96,75,0,0,94,93,96,89,85,79,62,70,79,84,95,98,78,86,81,77,80,91,96,86,78,80,92,74,70,84,88,86,72,73,50,96,92,68,86,94,73,93,78,0,86,77,83,50,84,80,85,87,89,90,90,101,16,92,62,56,85,79,87,80,79,72,65,62,91,93,98,88,84,82,81,88,87,95,83,81,82,87,96,94,90,103,89,85,82,86,86,90,90,87,90,89,93,77,92,95,74,77,68,73,80,87,79,94,74,90,0,83,71,61,71,62,61,59,71,0]},PW={"curve":[[5,405],[15,372],[30,308],[60,265],[300,231],[600,220],[1200,195],[3600,181]],"zones":[1117,802,817,863,93,26]},DUR=4165,VW=600;
const ZC=['#7fd1ff','#43d9a3','#ffd23f','#ff9f43','#ff6b6b','#e63946'];
const ZN=['Recovery','Endurance','Tempo','Threshold','VO2max','Anaerobic'];
const FTP=260, zi=p=>p<56?0:p<76?1:p<91?2:p<106?3:p<121?4:5, zColW=w=>ZC[zi((w/FTP)*100)];
function niceMax(v){const p=Math.pow(10,Math.floor(Math.log10(v)));const n=v/p;const s=n<=1?1:n<=1.5?1.5:n<=2?2:n<=2.5?2.5:n<=3?3:n<=4?4:n<=5?5:n<=6?6:n<=8?8:10;return s*p;}
function niceStep(range,target){const raw=range/target,p=Math.pow(10,Math.floor(Math.log10(raw))),n=raw/p,s=n<=1?1:n<=2?2:n<=2.5?2.5:n<=5?5:10;return s*p;}
function ticksFor(min,max,target){const step=niceStep(max-min,target);const lo=Math.ceil(min/step)*step,hi=Math.floor(max/step)*step,out=[];for(let v=hi;v>=lo-1e-9;v-=step)out.push(Math.round(v));return out;}
function smooth(pts){if(pts.length<2)return "";let d="M"+pts[0][0]+","+pts[0][1];for(let i=1;i<pts.length;i++){const a=pts[i-1],b=pts[i],mx=(a[0]+b[0])/2;d+=" Q"+a[0]+","+a[1]+" "+mx+","+((a[1]+b[1])/2)+" Q"+b[0]+","+b[1]+" "+b[0]+","+b[1];}return d;}
function insight(t){return "<div class='ins-line'><span class='tag'>Coach</span>"+t+"</div>";}
function track(o){
  const H=150,P=2;const vals=o.data.filter(v=>v!=null);
  let vmax,vmin;
  if(o.auto){const lo=Math.min.apply(null,vals),hi=Math.max.apply(null,vals),pad=(hi-lo)*0.1||5;vmax=hi+pad;vmin=lo-pad;}
  else{vmax=o.ymax!=null?o.ymax:niceMax(Math.max.apply(null,vals)||1);vmin=o.ymin!=null?o.ymin:0;}
  const yt=ticksFor(vmin,vmax,10); vmax=Math.max(vmax,yt[0]); vmin=Math.min(vmin,yt[yt.length-1]);
  const n=o.data.length,X=i=>P+(i/(n-1))*(VW-2*P),Y=v=>P+(1-(v-vmin)/((vmax-vmin)||1))*(H-2*P);
  const pts=o.data.map((v,i)=>v==null?null:[X(i),Y(v)]).filter(Boolean);
  const path=smooth(pts),avg=Math.round(vals.reduce((a,b)=>a+b,0)/vals.length),mx=Math.round(Math.max.apply(null,vals));
  const totMin=DUR/60,step=totMin>60?10:totMin>30?5:2,marks=[];for(let m=0;m<=totMin+0.01;m+=step)marks.push(m);
  const xf=m=>(m*60)/DUR;
  const xhtml=marks.map((m,i)=>{const f=xf(m),lab=(m>=60?(Math.floor(m/60)+":"+String(Math.round(m%60)).padStart(2,"0")):m+"m"),cls=i===0?"first":(i===marks.length-1?"last":"");return "<span class='"+cls+"' style='left:"+Math.min(100,f*100)+"%'>"+lab+"</span>";}).join("");
  const grid=yt.map(v=>"<line class='gl' x1='0' x2='"+VW+"' y1='"+Y(v)+"' y2='"+Y(v)+"'/>").join("")+marks.map(m=>{const x=P+xf(m)*(VW-2*P);return "<line class='gl gv' x1='"+x+"' x2='"+x+"' y1='0' y2='"+H+"'/>";}).join("");
  let area="";if(o.area){const L=pts[pts.length-1],F=pts[0];area="<defs><linearGradient id='g"+o.id+"' x1='0' x2='0' y1='0' y2='1'><stop offset='0' stop-color='"+o.color+"' stop-opacity='.28'/><stop offset='1' stop-color='"+o.color+"' stop-opacity='0'/></linearGradient></defs><path d='"+path+" L"+L[0]+","+(H-P)+" L"+F[0]+","+(H-P)+" Z' fill='url(#g"+o.id+")'/>";}
  const yhtml=yt.map(v=>"<span style='top:"+(Y(v)/H)*100+"%'>"+Math.round(v)+"</span>").join("");
  return "<div class='tcard'><div class='chd'><span class='lbl'>"+o.label+" <span style='color:var(--text-dim)'>"+o.unit+"</span></span><span class='ins'>avg <b>"+avg+"</b> · max <b>"+mx+"</b></span></div><div class='c2'><div class='c2y'>"+yhtml+"</div><div class='c2p'><svg class='tr' viewBox='0 0 "+VW+" "+H+"' preserveAspectRatio='none' height='150'>"+grid+area+"<path d='"+path+"' fill='none' stroke='"+o.color+"' stroke-width='2.25' stroke-linejoin='round' vector-effect='non-scaling-stroke'/></svg></div><div class='c2x'>"+xhtml+"</div></div>"+insight(o.insight)+"</div>";
}
function powerCurve(){
  const H=150,P=2,c=PW.curve,labs={5:'5s',15:'15s',30:'30s',60:'1m',300:'5m',600:'10m',1200:'20m',3600:'1h'};
  const xs=c.map(p=>Math.log(p[0])),xmin=Math.min.apply(null,xs),xmax=Math.max.apply(null,xs);
  const vmax=niceMax(Math.max.apply(null,c.map(p=>p[1])));
  const X=lx=>P+((lx-xmin)/((xmax-xmin)||1))*(VW-2*P),Y=v=>P+(1-v/vmax)*(H-2*P);
  const pts=c.map(p=>[X(Math.log(p[0])),Y(p[1])]),path="M"+pts.map(p=>p[0].toFixed(1)+","+p[1].toFixed(1)).join(" L");
  const yt=ticksFor(0,vmax,10);
  const grid=yt.map(v=>"<line class='gl' x1='0' x2='"+VW+"' y1='"+Y(v)+"' y2='"+Y(v)+"'/>").join("")+c.map(p=>{const x=X(Math.log(p[0]));return "<line class='gl gv' x1='"+x+"' x2='"+x+"' y1='0' y2='"+H+"'/>";}).join("");
  const dots=c.map((p,i)=>"<circle cx='"+pts[i][0]+"' cy='"+pts[i][1]+"' r='3' fill='#34e07d'/>").join("");
  const yhtml=yt.map(v=>"<span style='top:"+(Y(v)/H)*100+"%'>"+Math.round(v)+"</span>").join("");
  const xhtml=c.map((p,i)=>{const f=(Math.log(p[0])-xmin)/((xmax-xmin)||1),cls=i===0?"first":(i===c.length-1?"last":"");return "<span class='"+cls+"' style='left:"+f*100+"%'>"+labs[p[0]]+"</span>";}).join("");
  return "<div class='tcard'><div class='chd'><span class='lbl'>Power curve <span style='color:var(--text-dim)'>W · best avg by duration</span></span></div><div class='c2'><div class='c2y'>"+yhtml+"</div><div class='c2p'><svg class='tr' viewBox='0 0 "+VW+" "+H+"' preserveAspectRatio='none' height='150'>"+grid+"<defs><linearGradient id='gc' x1='0' x2='0' y1='0' y2='1'><stop offset='0' stop-color='#34e07d' stop-opacity='.25'/><stop offset='1' stop-color='#34e07d' stop-opacity='0'/></linearGradient></defs><path d='"+path+" L"+pts[pts.length-1][0]+","+(H-P)+" L"+pts[0][0]+","+(H-P)+" Z' fill='url(#gc)'/><path d='"+path+"' fill='none' stroke='#34e07d' stroke-width='2.25' vector-effect='non-scaling-stroke'/>"+dots+"</svg></div><div class='c2x'>"+xhtml+"</div></div>"+insight("20-min best 232 W is heat-suppressed — Saturday's flat test is the clean FTP read; today doesn't move 260 W yet.")+"</div>";
}
function zones(){
  const z=PW.zones,tot=z.reduce((a,b)=>a+b,0)||1,mmss=s=>Math.floor(s/60)+":"+String(Math.round(s%60)).padStart(2,"0");
  const bar=z.map((s,i)=>s>0?"<div style='width:"+(s/tot*100)+"%;background:"+ZC[i]+"'></div>":"").join("");
  const list=z.map((s,i)=>s>0?"<div class='zrow'><span class='zdot' style='background:"+ZC[i]+"'></span>"+ZN[i]+"<b>"+mmss(s)+"</b><span class='pct'>"+Math.round(s/tot*100)+"%</span></div>":"").join("");
  return "<div class='tcard'><div class='chd'><span class='lbl'>Time in zone <span style='color:var(--text-dim)'>FTP 260 W</span></span></div><div class='zbar'>"+bar+"</div>"+list+insight("Most time endurance→threshold, little above — the punchy terrain kept it sub-threshold instead of clean 10-min blocks.")+"</div>";
}
function binnedBlock(){const d=S.watts,B=9,binw=Math.floor(d.length/B),bins=[];for(let b=0;b<B;b++){let s=0,c=0;for(let i=b*binw;i<(b+1)*binw&&i<d.length;i++){s+=d[i];c++;}bins.push(c?s/c:0);}const mx=Math.max.apply(null,bins)||1;return "<div class='bars'>"+bins.map(v=>"<i style='height:"+Math.max(10,v/mx*100)+"%;background:"+zColW(v)+"'></i>").join("")+"</div>";}

// stats data
const STATS={overview:[["1:07","Time"],["27.2 km","Distance"],["452 m","Elevation"],["701","Calories"]],
 power:[["176 W","Avg power"],["198 W","Norm power"],["1.13","Variability"],["76%","Intensity"]],
 effort:[["151","Avg HR"],["171","Max HR"],["130","TRIMP"],["65","Load TSS"]],
 other:[["82","Cadence"],["48 · 52","L/R balance"]]};
const STAT_INS="NP 198 W at IF 76% — a real sweet-spot load. Decoupling 4.8% and the high HR-for-power are the heat, not fitness (expect it ~1–2 wks until you acclimatize).";
function tiles(arr){return "<div class='grid g4'>"+arr.map(s=>"<div class='gt'><b>"+s[0]+"</b><span>"+s[1]+"</span></div>").join("")+"</div>";}
function statA(){return "<div class='sect'>Overview</div>"+tiles(STATS.overview)+"<div class='sect'>Power</div>"+tiles(STATS.power)+"<div class='sect'>Effort</div>"+tiles(STATS.effort)+"<div class='sect'>Cadence &amp; balance</div>"+tiles(STATS.other)+insight(STAT_INS);}
function statB(){const hero=[["65","Load TSS"],["198 W","Norm power"],["76%","Intensity"],["151","Avg HR"]];const rest=[["1:07","time"],["27.2 km","dist"],["452 m","climb"],["701","kcal"],["176 W","avg pwr"],["1.13","VI"],["171","max HR"],["130","TRIMP"],["82","cad"],["48·52","L/R"]];
 return "<div class='hero'>"+hero.map(s=>"<div class='ht'><b>"+s[0]+"</b><span>"+s[1]+"</span></div>").join("")+"</div><div class='chiprow'>"+rest.map(s=>"<span class='mchip'><b>"+s[0]+"</b><span>"+s[1]+"</span></span>").join("")+"</div>"+insight(STAT_INS);}
function statC(){const g=(h,a)=>"<div class='rh'>"+h+"</div>"+a.map(s=>"<div class='rr'><span>"+s[1]+"</span><b>"+s[0]+"</b></div>").join("");
 return "<div class='rows'>"+g("Overview",STATS.overview)+g("Power",STATS.power)+g("Effort",STATS.effort)+g("Cadence & balance",STATS.other)+"</div>"+insight(STAT_INS);}
let sv="A";
function render(){
 const svbtn=(k,l)=>"<button class='"+(sv===k?"on":"")+"' onclick=\"sv='"+k+"';render()\">"+l+"</button>";
 document.getElementById("app").innerHTML=
 "<h4>1 · Thumbnail (block from real power) — agreed</h4>"+
 "<div class='card' style='display:flex;gap:12px;align-items:center'><div class='thumb'>"+binnedBlock()+"</div><div><b style='font-size:15px'>Monday Cottage Strong Efforts</b><div class='meta'>RIDE · OUTDOOR · ✓ Completed</div></div></div>"+
 "<h4>2 · Stats — pick a layout</h4>"+
 "<div class='tog'>"+svbtn("A","A · grouped tiles")+svbtn("B","B · hero + chips")+svbtn("C","C · compact rows")+"</div>"+
 "<p class='sub'>"+(sv==="A"?"All 14 as centered tiles, grouped.":sv==="B"?"4 big stats that matter + the rest as small chips (least bulky).":"Intervals-style label→value rows, grouped. Most compact, easy to scan.")+"</p>"+
 (sv==="A"?statA():sv==="B"?statB():statC())+
 "<h4>3 · Timeline — now with coach insight per chart + denser Y</h4>"+
 track({id:'p',label:'Power',unit:'W',data:S.watts,color:'#34e07d',area:true,insight:"VI 1.13 — the rolling terrain diluted the structured blocks; the roads were the limiter, not your effort."})+
 track({id:'h',label:'Heart rate',unit:'bpm',data:S.hr,color:'#ff5d6c',ymin:90,ymax:180,insight:"Avg 151, drift 4.8% in the heat — normal until you acclimatize. Cadence fell to 82 grinding the climbs."})+
 track({id:'a',label:'Altitude',unit:'m',data:S.alt,color:'#7a8699',area:true,auto:true,insight:"452 m of punchy up/down — that's why clean 10-min blocks were impossible; you got a rolling tempo/VO₂ stimulus instead."})+
 "<h4>4 · Power tab</h4>"+powerCurve()+zones();
}
render();
</script></body></html>
