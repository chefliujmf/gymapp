<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Plan check-in — 3 options (#488)</title>
<style>
  :root{ --text:#eef1f4; --dim:#9298a6; --faint:#6b7280; --accent:#34e07d; --bg:#0f1216; --card1:#21252f; --card2:#191c24; --line:#2a2f3a; --soft:#141821; }
  *{box-sizing:border-box}
  body{margin:0;background:#0a0c10;color:var(--text);font:15px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;-webkit-font-smoothing:antialiased}
  .phone{max-width:432px;margin:0 auto;background:var(--bg);padding:14px 13px 40px;min-height:100vh}
  h1{font-size:22px;margin:2px 0 1px;letter-spacing:-.4px}
  .sub{color:var(--dim);font-size:12.5px;margin:0 0 12px}
  .opts{display:flex;background:#11141b;border:1px solid var(--line);border-radius:12px;padding:4px;gap:3px;margin-bottom:6px}
  .opts button{flex:1;border:0;background:transparent;color:var(--dim);font:700 12px/1.2 inherit;padding:9px 3px;border-radius:9px;cursor:pointer}
  .opts button.on{background:var(--accent);color:#08130b}
  .ohelp{font-size:12px;color:var(--dim);min-height:30px;margin:8px 2px 14px;line-height:1.45}
  .views{display:flex;background:#11141b;border:1px solid var(--line);border-radius:11px;padding:4px;gap:3px;margin:0 0 11px}
  .views b{flex:1;text-align:center;color:var(--dim);font-size:12.5px;font-weight:700;padding:8px 3px;border-radius:8px}
  .views b.on{background:var(--accent);color:#08130b}
  .card{background:linear-gradient(157deg,var(--card1),var(--card2));border:1px solid var(--line);border-radius:13px;padding:12px 13px;margin-bottom:10px}
  /* full check-in */
  .ci-h{display:flex;align-items:center;gap:8px;margin-bottom:9px}
  .ci-h .t{color:#7fe4a6;font-weight:800;font-size:12px;letter-spacing:.02em}
  .ci-h .tag{font-size:10.5px;font-weight:700;color:#b98cff;background:#b98cff22;padding:3px 9px;border-radius:999px}
  .ci-h .ed{margin-left:auto;color:#7fa8ff;font-size:12.5px;font-weight:700}
  .ci-chips{display:flex;gap:6px;flex-wrap:wrap}
  .ci-chips span{background:#181c24;border:1px solid #3a4150;border-radius:999px;padding:6px 11px;font-size:12.5px;font-weight:700}
  .ci-e{border-color:#e0a33466}.ci-s{border-color:#5aa9ff66}
  .ci-coach{color:var(--dim);font-size:12px;margin-top:9px}
  /* compact strip */
  .ci-bar{display:flex;align-items:center;gap:8px;background:#12161d;border:1px solid var(--line);border-radius:11px;padding:9px 12px;margin-bottom:10px;font-size:12.5px;font-weight:700}
  .ci-bar .ok{color:#7fe4a6}.ci-bar .tag{color:#b98cff;font-size:11px}.ci-bar .sc{color:#c4cad4;font-weight:800;letter-spacing:.02em}.ci-bar .ed{margin-left:auto;color:#7fa8ff}
  /* bodies */
  .dayhead{display:flex;align-items:center;margin:12px 2px 8px}.dayhead .t{font-size:15px;font-weight:800}.add{margin-left:auto;background:#2fce76;color:#06130b;border:0;font-weight:800;font-size:12.5px;padding:7px 13px;border-radius:999px}
  .banner{background:linear-gradient(90deg,#5aa9ff18,#5aa9ff05);border-left:3px solid #5aa9ff;border-radius:0 10px 10px 0;padding:9px 11px;font-size:12.5px;margin-bottom:10px}
  .w-row{display:flex;align-items:center;gap:10px}.thumb{width:38px;height:38px;border-radius:10px;background:#122a33;display:flex;align-items:center;justify-content:center;font-size:18px;flex:none}.thumb.rec{background:#2a2410}
  .w-body h3{margin:0;font-size:14px}.meta{color:var(--dim);font-size:12px;margin-top:2px}
  .wk{display:flex;flex-direction:column;gap:6px}.wk .row{display:flex;gap:10px;background:var(--soft);border:1px solid var(--line);border-radius:10px;padding:8px 10px;align-items:center}.wk .row.t{border-color:#34e07d55;background:#14231b}
  .wk .dn{width:40px;flex:none}.wk .dn b{font-size:13px}.wk .dn span{display:block;color:var(--dim);font-size:10px;font-weight:700}
  .chip{font-size:11px;font-weight:700;padding:3px 8px;border-radius:7px;background:#12331f;color:#7fe4a6;margin-right:5px}.chip.g{background:#122a33;color:#8fd3ff}.chip.r{background:#191c24;color:var(--faint)}
  .lbl{font-size:10.5px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--faint);margin:16px 2px 8px;border-top:1px dashed var(--line);padding-top:12px}
</style>
</head>
<body>
<div class="phone">
  <h1>Plan · where the check-in lives</h1>
  <p class="sub">"Checked in today" must show in EVERY view (Day/Week/Month/Schedule). Preference stays in Settings. Pick A/B/C.</p>
  <div class="opts" id="opts">
    <button data-o="A" class="on">A · Full, on top</button>
    <button data-o="B">B · Compact strip</button>
    <button data-o="C">C · Adaptive</button>
  </div>
  <div class="ohelp" id="ohelp"></div>
  <div id="stage"></div>
</div>
<script>
  const FULL = `<div class="card"><div class="ci-h"><span class="t">✓ CHECKED IN TODAY</span><span class="tag">● Run-down</span><span class="ed">Edit</span></div><div class="ci-chips"><span class="ci-e">😣 Energy 2</span><span class="ci-s">😴 Sleep 3</span><span class="ci-e">😖 Freshness 2</span></div><div class="ci-coach">💬 Your coach has today's check-in</div></div>`;
  const BAR = `<div class="ci-bar"><span class="ok">✓ Checked in</span><span class="tag">● Run-down</span><span class="sc">😣2 · 😴3 · 😖2</span><span class="ed">Edit ›</span></div>`;
  const sw = (on) => `<div class="views">${['Day','Week','Month','Schedule'].map(v=>`<b class="${v===on?'on':''}">${v}</b>`).join('')}</div>`;
  const DAYBODY = `<div class="dayhead"><div class="t">Today's plan</div><button class="add">+ Add</button></div><div class="banner">A bit run-down — keep it easy and listen to your body today.</div><div class="card"><div class="w-row"><div class="thumb">🏋️</div><div class="w-body"><h3>Upper-Body & Trunk Strength</h3><div class="meta">67 min · 51 TSS</div></div></div></div><div class="card"><div class="w-row"><div class="thumb rec">🚴</div><div class="w-body"><h3>Easy Recovery Spin</h3><div class="meta">45 min · ▶ start</div></div></div></div>`;
  const WEEKBODY = `<div class="dayhead"><div class="t">This week · Jul 7–13</div><button class="add">+ Add</button></div><div class="wk"><div class="row"><div class="dn"><b>Mon</b><span>7</span></div><div><span class="chip">Endurance 1h30</span></div></div><div class="row"><div class="dn"><b>Wed</b><span>9</span></div><div><span class="chip">VO₂ 5×3</span><span class="chip g">Gym</span></div></div><div class="row t"><div class="dn"><b>Fri</b><span>11</span></div><div><span class="chip">Sweet-Spot</span><span class="chip g">Upper</span></div></div><div class="row"><div class="dn"><b>Sat</b><span>12</span></div><div><span class="chip">Long ride 3h</span></div></div></div>`;
  const OHELP = {
    A: 'A — the FULL check-in card sits ABOVE the view switcher, so it\'s the first thing every view. Most prominent; costs the most vertical space on Week/Month.',
    B: 'B — a slim ONE-LINE check-in strip pinned under the switcher on every view; tap to expand/Edit. Space-efficient, always there, less shouty.',
    C: 'C — ADAPTIVE: the full card in Day (where you focus on today), the compact strip in Week/Month/Schedule (where you\'re scanning a range). Best of both.',
  };
  let o='A';
  const render=()=>{
    document.getElementById('ohelp').textContent=OHELP[o];
    const day = o==='A' ? FULL+sw('Day')+DAYBODY : o==='B' ? sw('Day')+BAR+DAYBODY : sw('Day')+FULL+DAYBODY;
    const week = o==='A' ? FULL+sw('Week')+WEEKBODY : o==='B' ? sw('Week')+BAR+WEEKBODY : sw('Week')+BAR+WEEKBODY;
    document.getElementById('stage').innerHTML = day + `<div class="lbl">↑ Day view &nbsp;·&nbsp; ↓ same option, WEEK view</div>` + week;
  };
  document.getElementById('opts').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;o=b.dataset.o;[...e.currentTarget.children].forEach(x=>x.classList.toggle('on',x===b));render();});
  const h=(location.hash||'').replace('#','').toUpperCase(); if(['A','B','C'].includes(h)){o=h;[...document.getElementById('opts').children].forEach(x=>x.classList.toggle('on',x.dataset.o===h));}
  render();
</script>
</body>
</html>
