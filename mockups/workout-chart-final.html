<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Final true-shape chart</title>
<style>
:root{--text:#eef1f4;--dim:#9298a6;--line:#2a2f3a}
*{box-sizing:border-box;margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
body{background:#0f1216;color:var(--text);padding:20px;max-width:440px;margin:0 auto}
.card{background:linear-gradient(#21252f,#191c24);border:1px solid var(--line);border-radius:14px;padding:14px}
h2{font-size:14px;margin:0 0 2px}.sub{font-size:11px;color:var(--dim);margin:0 0 12px}
.profile{height:110px;position:relative;width:100%}
.profile svg{position:absolute;inset:0;width:100%;height:100%}
.ftplbl{position:absolute;right:2px;font-size:9px;color:rgba(255,255,255,.45)}
.profile-lbl{position:absolute;font-size:10px;font-weight:800;color:var(--text);white-space:nowrap}
.axis{position:relative;height:13px;margin-top:3px}
.axis span{position:absolute;font-size:9px;color:rgba(255,255,255,.4)}
.thumb{width:72px;height:72px;border-radius:12px;overflow:hidden;background:radial-gradient(120% 120% at 30% 20%,#1f6f5c,#134a4a 55%,#0e2f36)}
.thumb svg{width:100%;height:100%;padding:11px 8px;box-sizing:border-box}
.row{display:flex;gap:12px;align-items:center;margin-top:14px}
</style></head>
<body>
<div class="card">
  <h2>Tuesday Cottage Ride — true profile</h2>
  <p class="sub">Exactly what the new chart draws · FTP 260 · 1h15m · 50 TSS</p>
  <div class="profile">
    <svg viewBox="0 0 1000 110" preserveAspectRatio="none">
      <line x1="0" y1="18.3" x2="1000" y2="18.3" stroke="rgba(255,255,255,.22)" stroke-dasharray="6 4"/>
      <polygon points="0,110 0,64.2 133.3,50.4 133.3,110" fill="#43d9a3" fill-opacity="0.7" stroke="#43d9a3"/>
      <polygon points="133.3,110 133.3,50.4 866.7,50.4 866.7,110" fill="#43d9a3" fill-opacity="0.7" stroke="#43d9a3"/>
      <polygon points="866.7,110 866.7,66 1000,56.8 1000,110" fill="#43d9a3" fill-opacity="0.7" stroke="#43d9a3"/>
    </svg>
    <span class="ftplbl" style="top:16.7%;transform:translateY(-100%)">FTP 260W</span>
    <span class="profile-lbl" style="left:6.7%;top:45.8%;transform:translate(-50%,-115%)">130–169 W</span>
    <span class="profile-lbl" style="left:50%;top:45.8%;transform:translate(-50%,-115%)">169 W</span>
    <span class="profile-lbl" style="left:93.3%;top:51.7%;transform:translate(-50%,-115%)">125–151 W</span>
  </div>
  <div class="axis"><span style="left:0">0m</span><span style="left:20%;transform:translateX(-50%)">15m</span><span style="left:40%;transform:translateX(-50%)">30m</span><span style="left:60%;transform:translateX(-50%)">45m</span><span style="left:80%;transform:translateX(-50%)">60m</span><span style="left:100%;transform:translateX(-50%)">75m</span></div>
  <p class="sub" style="margin-top:8px">Tap a block for its target &amp; timing.</p>

  <div class="row">
    <div class="thumb">
      <svg viewBox="0 0 100 40" preserveAspectRatio="none">
        <polygon points="0,40 0,18.9 13.3,12.6 13.3,40" fill="#43d9a3" fill-opacity="0.85"/>
        <polygon points="13.3,40 13.3,12.6 86.7,12.6 86.7,40" fill="#43d9a3" fill-opacity="0.85"/>
        <polygon points="86.7,40 86.7,21.1 100,17.1 100,40" fill="#43d9a3" fill-opacity="0.85"/>
      </svg>
    </div>
    <p class="sub" style="margin:0">← the card thumbnail now shows the same true shape (ramp up, steady, ramp).</p>
  </div>
</div>
</body></html>
