<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root{--text:#eef1f4;--text-dim:#9298a6;--accent:#34e07d;--warn:#f0b145;--bg:#0f1216;--card1:#21252f;--card2:#191c24;--line:#2b2f39}
  *{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
  body{background:#07090c;color:var(--text);padding:16px;display:flex;flex-direction:column;align-items:center;gap:12px}
  .toggle{display:flex;gap:5px;width:430px;flex-wrap:wrap}
  .toggle button{flex:1 1 0;min-width:0;padding:9px 3px;border-radius:9px;border:1px solid var(--line);background:#14171d;color:var(--text-dim);font-size:11px;font-weight:700;cursor:pointer;line-height:1.15}
  .toggle button.on{background:var(--accent);color:#06210f;border-color:var(--accent)}
  .phone{width:430px;background:var(--bg);border-radius:24px;padding:18px 16px;border:1px solid #23262e;overflow:hidden}
  .back{width:44px;height:44px;border-radius:50%;background:#191c24;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--text-dim);margin-bottom:8px}
  h1{font-size:26px}
  .sub{font-size:13.5px;color:var(--text-dim);margin-top:3px}
  .stack{margin-top:14px;display:flex;flex-direction:column;gap:9px}
  .rowwrap{position:relative;border-radius:13px}
  .fbrow{position:relative;display:flex;align-items:center;gap:11px;background:linear-gradient(180deg,var(--card1),var(--card2));border:1px solid var(--line);border-radius:13px;padding:11px 12px}
  .fbrow__th{flex:none;width:40px;height:40px;border-radius:9px;background:#14181f;display:flex;align-items:center;justify-content:center;font-size:19px}
  .fbrow__b{flex:1;min-width:0}
  .fbrow__t{font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .st{font-size:12px;color:var(--text-dim);margin:1px 0 3px}
  .fbrow__m{font-size:11.5px;color:var(--text-dim);margin-top:3px;display:flex;gap:5px;flex-wrap:wrap}
  .fbmiss{font-size:9.5px;font-weight:800;color:var(--warn);border:1px solid rgba(240,177,69,.33);border-radius:999px;padding:1px 6px;text-transform:uppercase;letter-spacing:.3px}
  .fbprog{height:5px;border-radius:3px;background:#2a2f3a;overflow:hidden;margin-top:7px;max-width:150px}
  .fbprog i{display:block;height:100%;background:var(--warn)}
  .add{flex:none;font-size:12px;font-weight:800;color:var(--warn);background:rgba(240,177,69,.09);border:1px solid rgba(240,177,69,.27);border-radius:9px;padding:6px 11px;white-space:nowrap}
  /* 1 — twin pills */
  .acts{flex:none;display:flex;flex-direction:column;gap:6px;align-items:stretch}
  .skip-pill{font-size:11.5px;font-weight:700;color:var(--text-dim);background:transparent;border:1px solid var(--line);border-radius:9px;padding:5px 11px;text-align:center;white-space:nowrap}
  /* 2 — swipe reveal */
  .swipe-bg{position:absolute;inset:0;background:#2a2029;border:1px solid var(--line);border-radius:13px;display:flex;align-items:center;justify-content:flex-end;padding-right:20px;gap:7px;color:#e0a0a0;font-weight:800;font-size:13px}
  .swipe-fg{position:relative;transform:translateX(-92px);box-shadow:-8px 0 16px rgba(0,0,0,.35)}
  /* 3 — quiet link */
  .skip-link{display:block;text-align:center;font-size:11px;color:var(--text-dim);margin-top:6px;text-decoration:underline;text-underline-offset:2px}
  /* 4 — segmented */
  .seg{flex:none;display:flex;border:1px solid var(--line);border-radius:9px;overflow:hidden}
  .seg .s{font-size:11.5px;font-weight:700;color:var(--text-dim);padding:6px 10px;white-space:nowrap}
  .seg .a{font-size:12px;font-weight:800;color:var(--warn);background:rgba(240,177,69,.09);padding:6px 11px;border-left:1px solid var(--line);white-space:nowrap}
  .cap{width:430px;text-align:center;font-size:12px;color:var(--text-dim);line-height:1.45}
</style>

<div class="toggle">
  <button id="b1" class="on" onclick="show(1)">1 · Twin pills</button>
  <button id="b2" onclick="show(2)">2 · Swipe to skip</button>
  <button id="b3" onclick="show(3)">3 · Quiet link</button>
  <button id="b4" onclick="show(4)">4 · Segmented</button>
</div>

<div class="phone">
  <div class="back">‹</div>
  <div><h1>To review · 3</h1><div class="sub">Oldest first — a minute each, then your coach adapts your plan.</div></div>
  <div class="stack" id="list"></div>
</div>
<div class="cap" id="cap"></div>

<script>
  const SESS=[
    {e:'🏋️',t:'Easy Strength Day · Fri Jun 19',st:'53 min · 97 bpm',miss:['FEEL','RPE'],pct:15},
    {e:'🚴',t:'South Shore Sweet Spot · Jun 22',st:'72 min · 143 bpm · 88 TSS',miss:['FEEL','RPE'],pct:8},
    {e:'🏃',t:'Easy Aerobic Run · Wed Jun 25',st:'34 min · 148 bpm',miss:['RPE'],pct:45},
  ]
  const body=s=>`<div class="fbrow__th">${s.e}</div><div class="fbrow__b"><div class="fbrow__t">${s.t}</div><div class="st">${s.st}</div><div class="fbrow__m">${s.miss.map(m=>`<span class="fbmiss">${m}</span>`).join('')}</div><div class="fbprog"><i style="width:${Math.max(6,s.pct)}%"></i></div></div>`
  function render(m){
    document.getElementById('list').innerHTML=SESS.map((s,i)=>{
      if(m===1) return `<div class="rowwrap"><div class="fbrow">${body(s)}<div class="acts"><span class="add">Add →</span><span class="skip-pill">Skip</span></div></div></div>`
      if(m===2){ const sw=i===0?' swipe-fg':''; return `<div class="rowwrap"><div class="swipe-bg">✕ Skip</div><div class="fbrow${sw}">${body(s)}<span class="add">Add →</span></div></div>`}
      if(m===3) return `<div class="rowwrap"><div class="fbrow" style="flex-wrap:wrap">${body(s)}<span class="add">Add →</span><span class="skip-link" style="flex-basis:100%">Skip this one</span></div></div>`
      return `<div class="rowwrap"><div class="fbrow">${body(s)}<div class="seg"><span class="s">Skip</span><span class="a">Add →</span></div></div></div>`
    }).join('')
  }
  const caps={
    1:'1 · Twin pills — a muted “Skip” pill under the amber “Add →”. Matches the app’s pill language, clearly two choices, big targets. (Recommended)',
    2:'2 · Swipe to skip — swipe any row left to reveal Skip (iOS-style). Zero row clutter, but the gesture is less discoverable; pairs well with a first-time hint.',
    3:'3 · Quiet link — a small underlined “Skip this one” under the row. Understated, keeps the amber CTA the star.',
    4:'4 · Segmented — one control, two halves: muted “Skip” | amber “Add →”. Compact and tidy.'
  }
  function show(m){for(const x of[1,2,3,4])document.getElementById('b'+x).classList.toggle('on',x===m);render(m);document.getElementById('cap').textContent=caps[m]}
  show(1)
</script>
