<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Platyplus · #234 per-sport VO₂max</title>
<style>
  :root{--text:#eef1f4;--text-dim:#9298a6;--accent:#34e07d;--blue:#5ec8ff;--amber:#f0b145;--red:#ff6b8b;--line:#2b303b;--grid:#222732;--bg:#0f1216;--card:linear-gradient(180deg,#21252f,#191c24);}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font:15px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;display:flex;justify-content:center;padding:16px 12px 60px}
  .phone{width:100%;max-width:430px}
  .tabs{display:flex;gap:6px;margin-bottom:12px;background:#161a21;border:1px solid var(--line);border-radius:999px;padding:4px}
  .tabs button{flex:1;border:0;background:transparent;color:var(--text-dim);font-weight:700;font-size:11.5px;padding:9px 4px;border-radius:999px;cursor:pointer}
  .tabs button.on{background:var(--accent);color:#06281a}
  .desc{font-size:12px;color:var(--text-dim);margin:0 2px 12px;line-height:1.45}.desc b{color:var(--text)}
  .seclbl{font-size:11px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:var(--text-dim);margin:14px 2px 8px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px}
  /* global headline row */
  .gl{display:flex;align-items:center;gap:10px;background:#14181f;border:1px solid var(--line);border-radius:12px;padding:10px 12px;margin-bottom:12px}
  .gl b{font-size:22px}.gl .l{font-size:10px;color:var(--text-dim);font-weight:700;text-transform:uppercase;letter-spacing:.3px}
  .conf{font-size:9px;font-weight:800;border-radius:999px;padding:2px 7px;border:1px solid}
  .conf--hi{color:var(--accent);border-color:rgba(52,224,125,.45)}
  .conf--med{color:var(--blue);border-color:rgba(94,200,255,.45)}
  .conf--lo{color:var(--amber);border-color:rgba(240,177,69,.45)}
  /* vo2 card */
  .v2h{display:flex;align-items:flex-start;justify-content:space-between}
  .v2h h3{margin:0;font-size:14px}
  .v2val{font-size:40px;font-weight:800;line-height:1;margin:6px 0 2px}.v2val small{font-size:14px;color:var(--text-dim);font-weight:600}
  .v2src{font-size:12px;color:var(--text-dim)}
  /* confidence meter (B) */
  .meter{display:flex;gap:4px;margin-top:8px}.meter i{height:6px;flex:1;border-radius:3px;background:#2a3340}.meter i.on{background:var(--blue)}
  .meter.hi i.on{background:var(--accent)}
  /* two-number (C) */
  .twocol{display:flex;gap:10px;margin-top:8px}.twocol div{flex:1;background:#14181f;border:1px solid var(--line);border-radius:10px;padding:8px;text-align:center}
  .twocol b{display:block;font-size:20px}.twocol span{font-size:9.5px;color:var(--text-dim)}
  .cta{display:inline-block;margin-top:10px;font-size:12px;font-weight:700;color:var(--accent);border:1px solid rgba(52,224,125,.4);border-radius:999px;padding:6px 12px}
  /* trend chart (to the standard: axes + insight) */
  .ct{margin-top:12px}
  .ct__t{font-size:12px;font-weight:700;margin-bottom:2px}
  .wt{position:relative;padding-left:30px;margin-top:6px}
  .wt__plot{position:relative;height:120px}
  .wt__svg{position:absolute;inset:0;width:100%;height:100%}
  .wt__y{position:absolute;right:100%;margin-right:5px;transform:translateY(-50%);font-size:9px;color:var(--text-dim)}
  .wt__x{display:flex;justify-content:space-between;font-size:9px;color:var(--text-dim);margin-top:3px}
  .insight{font-size:12px;color:var(--text);margin-top:8px;background:rgba(52,224,125,.08);border:1px solid rgba(52,224,125,.25);border-radius:9px;padding:8px 10px}
  .note{font-size:11px;color:var(--text-dim);margin-top:10px;line-height:1.45}.note b{color:var(--text)}
</style></head>
<body><div class="phone">
  <div class="tabs">
    <button class="on" onclick="show('a',this)">A · pill + source</button>
    <button onclick="show('b',this)">B · confidence meter</button>
    <button onclick="show('c',this)">C · est. vs test</button>
  </div>
  <div id="desc" class="desc"></div>

  <div class="seclbl">Global · benchmarks</div>
  <div class="gl"><span style="font-size:20px">🫁</span><div style="flex:1"><div class="l">VO₂max · headline</div></div><b>52</b><span class="conf conf--med" style="margin-left:8px">running · est.</span></div>

  <div class="seclbl">Running</div>
  <div class="card" id="card"></div>
</div>
<script>
// VO2max trend (6 months) — chart to the standard: Y axis, X axis, insight
function chart(){
  const data=[49,49.5,50,51,51.5,52], months=['Jan','Feb','Mar','Apr','May','Jun'];
  const mn=Math.min(...data),mx=Math.max(...data),mid=Math.round((mn+mx)/2*10)/10;
  const py=v=>(1-(v-mn)/((mx-mn)||1))*100, px=i=>i/(data.length-1)*100;
  const line=data.map((v,i)=>`${px(i).toFixed(1)},${py(v).toFixed(1)}`).join(' ');
  return `<div class="ct"><div class="ct__t">VO₂max trend</div>
   <div class="wt"><div class="wt__plot">
    <svg class="wt__svg" viewBox="0 0 100 100" preserveAspectRatio="none">
     <line x1="0" y1="${py(mid)}" x2="100" y2="${py(mid)}" stroke="#222732" vector-effect="non-scaling-stroke"/>
     <polyline points="${line}" fill="none" stroke="#34e07d" stroke-width="2.2" vector-effect="non-scaling-stroke"/>
    </svg>
    <span class="wt__y" style="top:0%">${mx}</span><span class="wt__y" style="top:50%">${mid}</span><span class="wt__y" style="top:100%">${mn}</span>
   </div><div class="wt__x">${months.map(m=>`<span>${m}</span>`).join('')}</div></div>
   <div class="insight">📈 <b>+3 since January</b> — your aerobic base is climbing. Estimated from steady-run HR↔pace.</div>
  </div>`;
}
const HEAD=`<div class="v2h"><h3>🫁 VO₂max</h3>{CONF}</div><div class="v2val">52<small> ml/kg/min</small></div>`;
const SRC=`<div class="v2src">Estimated from your steady-run HR↔pace · max HR 185 / rest 55 · updated 2 days ago</div>`;

const A=HEAD.replace('{CONF}','<span class="conf conf--med">estimated · medium</span>')+SRC+chart()
 +`<a class="cta">Confirm with a quick test →</a>`
 +`<div class="note"><b>No max effort needed</b> — this learns from your normal runs (how Coros/Garmin do it). A one-off field test would bump it to <b>high confidence</b>.</div>`;

const B=HEAD.replace('{CONF}','<span class="v2src" style="font-weight:700;color:var(--blue)">medium confidence</span>')
 +SRC+`<div class="meter"><i class="on"></i><i class="on"></i><i></i></div>`+chart()
 +`<a class="cta">Improve confidence: do a test →</a>`
 +`<div class="note">Confidence grows as more steady runs come in; a field test fills the last bar (<b>high</b>).</div>`;

const C=HEAD.replace('{CONF}','')+`<div class="twocol"><div><b>52</b><span>estimated (runs)</span></div><div><b>—</b><span>last test</span></div></div>`+chart()
 +`<a class="cta">Log a test result →</a>`
 +`<div class="note">Shows the live <b>estimate</b> next to your last <b>measured</b> test. When you test, it becomes the anchor and we flag a re-test only if the estimate drifts.</div>`;

const DESC={
 a:'<b>A — confidence pill + source line (recommended).</b> Big value, a coloured "estimated · medium" pill, one-line source (HR↔pace, your max/rest HR, freshness), trend chart (axes + insight), and an optional "confirm with a test" — never required.',
 b:'<b>B — confidence meter.</b> A 3-segment bar (low/med/high) makes "how sure are we" visual; a field test fills the last bar.',
 c:'<b>C — estimate vs test.</b> Shows the live estimate beside your last measured test; the test anchors, the estimate tracks, re-test only on drift.',
};
function show(m,btn){document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove('on'));btn.classList.add('on');
 document.getElementById('desc').innerHTML=DESC[m];document.getElementById('card').innerHTML={a:A,b:B,c:C}[m];}
const init=(location.hash||'#a').slice(1);show(init,document.querySelectorAll('.tabs button')[{a:0,b:1,c:2}[init]??0]);
</script>
</body></html>
