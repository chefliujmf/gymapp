<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Run analysis — visual check</title>
<style>
  :root{--text:#eef1f4;--dim:#9298a6;--accent:#34e07d;--line:#2a2f3a}
  *{box-sizing:border-box;margin:0}body{background:#0f1216;color:var(--text);font:14px/1.45 -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;padding:14px;max-width:460px;margin:auto}
  .tl-card{background:linear-gradient(180deg,#21252f,#191c24);border:1px solid var(--line);border-radius:14px;padding:12px;margin-top:12px}
  .tl-clabel{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;font-weight:800;margin-bottom:8px}
  .chart2{display:grid;grid-template-columns:46px 1fr;gap:2px}
  .chart2__y{position:relative}
  .chart2__y span{position:absolute;right:4px;transform:translateY(-50%);font-size:10px;color:var(--dim)}
  .chart2__x{display:flex;justify-content:space-between;font-size:10px;color:var(--dim);margin-top:3px;grid-column:2}
  svg{display:block;width:100%}
  .zbar{display:flex;height:16px;border-radius:5px;overflow:hidden;margin:4px 0 8px}
  .zrow{display:flex;align-items:center;gap:7px;font-size:12.5px;padding:3px 0}
  .zdot{width:10px;height:10px;border-radius:3px;flex:none}
  .zrow b{margin-left:auto}.zrow .meta{color:var(--dim);min-width:38px;text-align:right}
  .act-ins{display:flex;gap:7px;font-size:12px;color:var(--dim);margin-top:8px;align-items:flex-start}
  .act-ins .tag{color:var(--accent)}
  .hero{display:flex;gap:8px;margin:10px 0}
  .ht{flex:1;background:linear-gradient(180deg,#21252f,#191c24);border:1px solid var(--line);border-radius:12px;padding:12px 6px;text-align:center}
  .ht b{display:block;font-size:20px}.ht span{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.4px}
</style>
<script>
const VW=320,H=170
function fmtP(s){s=Math.round(s);return Math.floor(s/60)+':'+String(s%60).padStart(2,'0')}
const zoneColor=p=>p<60?'#4aa3ff':p<76?'#34e07d':p<91?'#c9e04a':p<106?'#f0b145':p<121?'#f0714d':'#e0484d'
// PaceCurveChart replica (inverted: faster=up, log duration)
function paceCurve(secs,pace){
  const padT=8,padB=6,pad=6
  const sMin=Math.min(...secs),sMax=Math.max(...secs),pMin=Math.min(...pace),pMax=Math.max(...pace)
  const span=Math.max(pMax-pMin,20),lo=pMin-span*0.08,range=span*1.16
  const lx=s=>pad+((Math.log(s)-Math.log(sMin))/(Math.log(sMax)-Math.log(sMin)||1))*(VW-2*pad)
  const y=p=>padT+((p-lo)/range)*(H-padT-padB)
  const D=[[1,'1s'],[5,'5s'],[15,'15s'],[60,'1m'],[300,'5m'],[1200,'20m'],[3600,'1h']].filter(([s])=>s>=sMin&&s<=sMax)
  const yl=[0,.25,.5,.75,1].map(f=>lo+f*range)
  const d='M'+secs.map((s,i)=>lx(s)+','+y(pace[i])).join(' L')
  return `<div class="tl-card"><div class="tl-clabel">PACE CURVE · best avg pace by duration (min/km)</div>
  <div class="chart2"><div class="chart2__y">${yl.map(p=>'<span style="top:'+(((p-lo)/range)*100)+'%">'+fmtP(p)+'</span>').join('')}</div>
  <div><svg viewBox="0 0 ${VW} ${H}" preserveAspectRatio="none" height="170">
  ${yl.map(p=>'<line x1="0" x2="'+VW+'" y1="'+y(p)+'" y2="'+y(p)+'" stroke="#2a2f3a" stroke-width=".5" opacity=".35"/>').join('')}
  ${D.map(([s])=>'<line x1="'+lx(s)+'" x2="'+lx(s)+'" y1="8" y2="'+(H-6)+'" stroke="#2a2f3a" stroke-width=".5" opacity=".4"/>').join('')}
  <defs><linearGradient id="pf" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="#34e07d" stop-opacity=".25"/><stop offset="1" stop-color="#34e07d" stop-opacity="0"/></linearGradient></defs>
  <path d="${d} L${lx(secs[secs.length-1])},${H-6} L${lx(secs[0])},${H-6} Z" fill="url(#pf)"/>
  <path d="${d}" fill="none" stroke="#34e07d" stroke-width="2.25" stroke-linejoin="round" vector-effect="non-scaling-stroke"/>
  </svg><div class="chart2__x">${D.map(([,l])=>'<span>'+l+'</span>').join('')}</div></div></div>
  <div class="act-ins"><span class="tag">💡</span>Best 5-min ${fmtP(pace[secs.indexOf(300)])}/km · quickest ${fmtP(pace[0])}/km</div></div>`
}
// pace timeline (smoothed, faster=down as sec/km)
function paceTL(pace){
  const P=1,mn=Math.min(...pace),mx=Math.max(...pace),span=Math.max(mx-mn,22),lo=mn-span*.08,rg=span*1.16
  const x=i=>P+i/(pace.length-1)*(VW-2*P),y=v=>P+(v-lo)/rg*(H-2*P) // faster (low sec) = top
  const pts=pace.map((v,i)=>[x(i),y(v)])
  let d='M'+pts[0][0]+','+pts[0][1];for(let i=0;i<pts.length-1;i++){const p0=pts[i-1]||pts[i],p1=pts[i],p2=pts[i+1],p3=pts[i+2]||p2;d+=' C'+(p1[0]+(p2[0]-p0[0])/6)+','+(p1[1]+(p2[1]-p0[1])/6)+' '+(p2[0]-(p3[0]-p1[0])/6)+','+(p2[1]-(p3[1]-p1[1])/6)+' '+p2[0]+','+p2[1]}
  const yl=[0,.25,.5,.75,1].map(f=>lo+f*rg)
  return `<div class="tl-card"><div class="tl-clabel">PACE /km · avg 6:14 · best 5:41</div>
  <div class="chart2"><div class="chart2__y">${yl.map(p=>'<span style="top:'+((p-lo)/rg*100)+'%">'+fmtP(p)+'</span>').join('')}</div>
  <div><svg viewBox="0 0 ${VW} ${H}" preserveAspectRatio="none" height="170">
  ${yl.map(p=>'<line x1="0" x2="'+VW+'" y1="'+y(p)+'" y2="'+y(p)+'" stroke="#2a2f3a" stroke-width=".5" opacity=".35"/>').join('')}
  <defs><linearGradient id="tf" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="#34e07d" stop-opacity=".3"/><stop offset="1" stop-color="#34e07d" stop-opacity="0"/></linearGradient></defs>
  <path d="${d} L${pts[pts.length-1][0]},${H-P} L${pts[0][0]},${H-P} Z" fill="url(#tf)"/>
  <path d="${d}" fill="none" stroke="#34e07d" stroke-width="2.25" vector-effect="non-scaling-stroke"/></svg>
  <div class="chart2__x"><span>0m</span><span>10m</span><span>20m</span><span>30m</span></div></div></div>
  <div class="act-ins"><span class="tag">💡</span>Avg 6:14/km — evenly paced, well controlled</div></div>`
}
function zones(){
  const Z=['Recovery','Easy','Marathon','Threshold','Interval','Rep'],PCT=[50,68,85,98,108,120],sec=[180,900,300,120,0,0]
  const tot=sec.reduce((a,b)=>a+b,0),mm=s=>Math.floor(s/60)+':'+String(s%60).padStart(2,'0')
  return `<div class="tl-card"><div class="tl-clabel">TIME IN ZONE · threshold 5:25/km</div>
  <div class="zbar">${Z.map((z,i)=>sec[i]>0?'<div style="width:'+(sec[i]/tot*100)+'%;background:'+zoneColor(PCT[i])+'"></div>':'').join('')}</div>
  ${Z.map((z,i)=>sec[i]>0?'<div class="zrow"><span class="zdot" style="background:'+zoneColor(PCT[i])+'"></span>'+z+'<b>'+mm(sec[i])+'</b><span class="meta">'+Math.round(sec[i]/tot*100)+'%</span></div>':'').join('')}
  <div class="act-ins"><span class="tag">💡</span>Most time in Easy (60%) — a genuinely easy aerobic run</div></div>`
}
const curveS=[1,5,15,30,60,300,600,1200],curveP=[210,225,238,250,262,341,358,372]
addEventListener('DOMContentLoaded',()=>{document.body.innerHTML=
  '<div class="hero"><div class="ht"><b>8.42 km</b><span>Distance</span></div><div class="ht"><b>6:14/km</b><span>Avg pace</span></div><div class="ht"><b>48</b><span>Load (TSS)</span></div><div class="ht"><b>151 bpm</b><span>Avg HR</span></div></div>'+
  paceTL([360,352,348,355,362,341,345,358,372,368,360,355,350,348,352,360,365,370,368,362])+
  paceCurve(curveS,curveP)+
  zones()})
</script>
