<style>body{background:#0f1216;margin:0;padding:20px;display:flex;justify-content:center}
.card{width:344px;background:linear-gradient(160deg,#21252f,#191c24);border:1px solid #2c313d;border-radius:16px;padding:14px;font:14px -apple-system,sans-serif;color:#eef1f4}
.t{font-size:13px;color:#9298a6;font-weight:700;margin-bottom:4px}
.ins{font-size:12.5px;color:#9298a6;margin-top:6px}</style>
<div class="card">
  <div class="t">Your power curve, fitted ⓘ</div>
  <div id="svg"></div>
  <div class="ins">One fit, your whole engine: Critical Power 248 W is the sustainable floor, W′ 17.1 kJ the battery above it. FTP, TTE and your zones all read off this curve — change one, the rest follow.</div>
</div>
<script>
// EXACT replica of DurationCurve() with JM's real curve data
const secs=[300,600,720,900,1200,1500,1800,2400], values=[310,276,271,248,246,233,226,220], asymptote=248, unit=' W', fmt=v=>Math.round(v), reserveLabel="W′ 17.1 kJ", anchors=[{sec:300,label:'310 · MAP'},{sec:1200,label:'20m'}];
const W=344,padL=36,padR=12,padT=16,padB=22,height=156,plotW=W-padL-padR,plotH=height-padT-padB;
const pts=secs.map((s,i)=>[s,values[i]]).filter(([s,v])=>s>=55&&s<=4200&&v>0).sort((a,b)=>a[0]-b[0]);
const sMin=60,sMax=3600,L=Math.log10(sMin),R=Math.log10(sMax);
const lx=s=>padL+(Math.log10(Math.max(sMin,Math.min(sMax,s)))-L)/(R-L)*plotW;
const vs=pts.map(p=>p[1]),vMax=Math.max(...vs)*1.04,vMin=Math.min(asymptote,Math.min(...vs))*0.96;
const ly=v=>padT+(1-(v-vMin)/(vMax-vMin))*plotH;
const xy=pts.map(p=>[lx(p[0]),ly(p[1])]);
const cpY=ly(asymptote);
function smoothPath(p){if(!p.length)return'';if(p.length<3)return'M'+p.map(q=>q[0]+','+q[1]).join(' L');let d='M'+p[0][0]+','+p[0][1];for(let i=0;i<p.length-1;i++){const p0=p[i-1]||p[i],p1=p[i],p2=p[i+1],p3=p[i+2]||p2;d+=' C'+(p1[0]+(p2[0]-p0[0])/6)+','+(p1[1]+(p2[1]-p0[1])/6)+' '+(p2[0]-(p3[0]-p1[0])/6)+','+(p2[1]-(p3[1]-p1[1])/6)+' '+p2[0]+','+p2[1];}return d;}
function valueAtSec(p,sec){for(const[s,v]of p)if(s>=sec)return v;return p.length?p[p.length-1][1]:null;}
const ticks=[[60,'1m'],[300,'5m'],[1200,'20m'],[3600,'60m']];
let svg=`<svg viewBox="0 0 ${W} ${height}" style="width:100%;height:auto;display:block">`;
svg+=`<line x1="${padL}" y1="${padT-4}" x2="${padL}" y2="${height-padB}" stroke="#333a45"/>`;
svg+=`<line x1="${padL}" y1="${height-padB}" x2="${W-padR}" y2="${height-padB}" stroke="#333a45"/>`;
svg+=`<path d="M${xy[0][0]},${xy[0][1]} ${xy.map(p=>'L'+p[0]+','+p[1]).join(' ')} L${xy[xy.length-1][0]},${cpY} L${xy[0][0]},${cpY} Z" fill="rgba(155,140,255,.13)"/>`;
svg+=`<line x1="${padL}" y1="${cpY}" x2="${W-padR}" y2="${cpY}" stroke="#9b8cff" stroke-width="1.4" stroke-dasharray="5 4"/>`;
svg+=`<text x="${W-padR}" y="${cpY-4}" fill="#9b8cff" font-size="10" text-anchor="end" font-weight="700">${fmt(asymptote)}${unit}</text>`;
svg+=`<path d="${smoothPath(xy)}" fill="none" stroke="#34e07d" stroke-width="2.4" stroke-linecap="round"/>`;
anchors.forEach(a=>{const v=valueAtSec(pts,a.sec);if(v==null)return;const x=lx(a.sec),y=ly(v);svg+=`<circle cx="${x}" cy="${y}" r="3.6" fill="#34e07d"/><text x="${Math.min(W-24,Math.max(padL+12,x))}" y="${y-7}" fill="#eef1f4" font-size="9.5" text-anchor="middle">${a.label}</text>`;});
svg+=`<text x="${lx(150)}" y="${ly(vMax)+12}" fill="#9b8cff" font-size="10.5" font-weight="700">${reserveLabel}</text>`;
ticks.forEach(([s,l])=>{svg+=`<text x="${lx(s)}" y="${height-6}" fill="#9298a6" font-size="10" text-anchor="middle">${l}</text>`;});
svg+='</svg>';
document.getElementById('svg').innerHTML=svg;
</script>
