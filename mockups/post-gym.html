<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Post-gym stats — options</title>
<style>
  :root { --text:#eef1f4; --text-dim:#9298a6; --accent:#34e07d; --bg:#0f1216; --line:#272b33; }
  * { box-sizing:border-box; }
  body { margin:0; background:#0a0c0f; color:var(--text); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; padding:18px; }
  h1 { font-size:17px; margin:0 0 4px; } p.sub { color:var(--text-dim); font-size:13px; margin:0 0 14px; }
  .opts { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; }
  .opts button { background:#191c24; color:var(--text); border:1px solid var(--line); border-radius:999px; padding:8px 14px; font-weight:700; font-size:13px; cursor:pointer; }
  .opts button.on { background:var(--accent); color:#06281a; border-color:var(--accent); }
  .frame { max-width:400px; margin:0 auto; }
  .eyebrow { font-size:11px; font-weight:800; letter-spacing:.5px; text-transform:uppercase; color:var(--accent); }
  h2 { font-size:20px; margin:3px 0 14px; }
  .card { background:linear-gradient(#21252f,#191c24); border:1px solid var(--line); border-radius:16px; padding:14px; margin-bottom:12px; }
  .grid { display:flex; gap:8px; }
  .stat { flex:1; background:rgba(255,255,255,.04); border:1px solid var(--line); border-radius:12px; padding:11px 6px; text-align:center; }
  .stat .v { font-size:19px; font-weight:800; } .stat .v small{font-size:11px;color:var(--text-dim);font-weight:700}
  .stat .k { font-size:10px; color:var(--text-dim); text-transform:uppercase; letter-spacing:.4px; font-weight:700; margin-top:2px; }
  .sec { font-size:13px; font-weight:800; margin:16px 0 9px; }
  .exrow { display:flex; align-items:center; justify-content:space-between; padding:9px 0; border-top:1px solid var(--line); }
  .exrow:first-child{border-top:none}
  .exrow .n { font-weight:700; font-size:14px; } .exrow .d { color:var(--text-dim); font-size:12px; margin-top:2px; }
  .pr { background:rgba(255,213,74,.16); color:#ffd54a; font-size:10px; font-weight:800; padding:2px 7px; border-radius:999px; }
  .bar { height:7px; border-radius:999px; background:rgba(255,255,255,.08); overflow:hidden; margin-top:6px; }
  .bar > i { display:block; height:100%; background:linear-gradient(90deg,#34e07d,#22b463); }
  .muscle { display:flex; flex-wrap:wrap; gap:6px; margin-top:4px; }
  .mch { font-size:11px; font-weight:700; padding:4px 10px; border-radius:999px; background:rgba(179,136,255,.13); color:#b388ff; border:1px solid rgba(179,136,255,.28); }
  .hl { display:flex; gap:8px; align-items:flex-start; padding:7px 0; }
  .hl .i { font-size:18px; } .hl .t { font-size:13px; } .hl .t b{color:var(--text)}
  .chips { display:flex; flex-wrap:wrap; gap:6px; }
  .chip2 { font-size:11px; font-weight:700; padding:4px 10px; border-radius:999px; border:1px solid; }
  .c-vol{color:#34e07d;background:rgba(52,224,125,.13);border-color:rgba(52,224,125,.28)}
  .c-set{color:#7ab8ff;background:rgba(122,184,255,.13);border-color:rgba(122,184,255,.28)}
  .c-rep{color:#ffd54a;background:rgba(255,213,74,.13);border-color:rgba(255,213,74,.28)}
  .c-tim{color:#cbd2dd;background:rgba(203,210,221,.10);border-color:rgba(203,210,221,.18)}
</style>
</head>
<body>
<div class="frame">
  <h1>Post-gym workout stats — options</h1>
  <p class="sub">After "Rainy Day Full-Body Strength" (6 exercises). Built from your logged sets (weight×reps).</p>
  <div class="opts">
    <button data-opt="A" class="on">A · Volume hero + top sets</button>
    <button data-opt="B">B · Per-exercise breakdown</button>
    <button data-opt="C">C · Compact + highlights</button>
  </div>
  <div id="out"></div>
</div>

<script>
const head = '<span class="eyebrow">✓ Completed · gym</span><h2>Rainy Day Full-Body Strength</h2>';
const statRow = '<div class="grid">'
  + '<div class="stat"><div class="v">4,820<small> kg</small></div><div class="k">Volume</div></div>'
  + '<div class="stat"><div class="v">22</div><div class="k">Sets</div></div>'
  + '<div class="stat"><div class="v">198</div><div class="k">Reps</div></div>'
  + '<div class="stat"><div class="v">48<small> min</small></div><div class="k">Time</div></div></div>';

const layouts = {
  A: head
    + '<div class="card">' + statRow + '</div>'
    + '<div class="sec">Top set per exercise</div><div class="card">'
    + exrow('Dumbbell goblet squat','4×8 · top 32 kg', 'VOLUME PR')
    + exrow('Dumbbell Romanian deadlift','4×8 · top 30 kg', '')
    + exrow('Dumbbell bench press','4×8 · top 26 kg', '')
    + exrow('Machine seated cable row','4×10 · top 55 kg', '')
    + exrow('Dumbbell seated shoulder press','3×10 · top 18 kg', '')
    + exrow('Cable Pallof press','3×12 · top 15 kg', '') + '</div>',

  B: head
    + '<div class="sec">By exercise</div>'
    + exCard('Dumbbell goblet squat','4×8 @ 32 kg · 1,024 kg', 90, 'Quads · Glutes')
    + exCard('Dumbbell Romanian deadlift','4×8 @ 30 kg · 960 kg', 84, 'Hamstrings · Glutes')
    + exCard('Dumbbell bench press','4×8 @ 26 kg · 832 kg', 73, 'Chest · Triceps')
    + exCard('Machine seated cable row','4×10 @ 55 kg · 2,200 kg', 100, 'Back · Biceps'),

  C: head
    + '<div class="card"><div class="chips">'
    + '<span class="chip2 c-vol">🏋️ 4,820 kg volume</span>'
    + '<span class="chip2 c-set">📦 22 sets</span>'
    + '<span class="chip2 c-rep">🔁 198 reps</span>'
    + '<span class="chip2 c-tim">⏱ 48 min</span></div></div>'
    + '<div class="sec">Highlights</div><div class="card">'
    + hl('🏆','<b>Volume PR</b> on Goblet squat — 1,024 kg (was 920 kg)')
    + hl('💪','<b>Hardest set:</b> Cable row 10×55 kg')
    + hl('🎯','<b>Muscles hit:</b> <div class="muscle"><span class="mch">Legs</span><span class="mch">Back</span><span class="mch">Chest</span><span class="mch">Shoulders</span><span class="mch">Core</span></div>')
    + '</div>'
    + '<div class="sec">Coach suggestion</div><div class="card"><div class="hl"><div class="i">🧑‍🏫</div><div class="t">Solid full-body day. Next time try +2.5 kg on the squat — your top set moved well.</div></div></div>'
};

function exrow(n,d,pr){ return '<div class="exrow"><div><div class="n">'+n+'</div><div class="d">'+d+'</div></div>'+(pr?'<span class="pr">'+pr+'</span>':'')+'</div>'; }
function exCard(n,d,pct,m){ return '<div class="card"><div class="n" style="font-weight:700">'+n+'</div><div class="d" style="color:var(--text-dim);font-size:12px;margin-top:2px">'+d+'</div><div class="bar"><i style="width:'+pct+'%"></i></div><div class="muscle">'+m.split(' · ').map(x=>'<span class="mch">'+x+'</span>').join('')+'</div></div>'; }
function hl(i,t){ return '<div class="hl"><div class="i">'+i+'</div><div class="t">'+t+'</div></div>'; }

function render(o){ document.getElementById('out').innerHTML = layouts[o]; document.querySelectorAll('.opts button').forEach(b=>b.classList.toggle('on',b.dataset.opt===o)); }
document.querySelectorAll('.opts button').forEach(b=>b.onclick=()=>render(b.dataset.opt));
render('A');
</script>
</body>
</html>
