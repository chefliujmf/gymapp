<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Platyplus · #194 Stats v1 follow-ups</title>
<style>
  :root{--text:#eef1f4;--text-dim:#9298a6;--accent:#34e07d;--blue:#5ec8ff;--purple:#b98cff;--pink:#ff8fb1;--amber:#f0b145;--line:#2b303b;--bg:#0f1216;--card-grad:linear-gradient(180deg,#21252f,#191c24);--radius:16px;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font:15px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;display:flex;justify-content:center;padding:16px 12px 60px}
  .phone{width:100%;max-width:430px}
  .tabs{display:flex;gap:6px;margin-bottom:14px;background:#161a21;border:1px solid var(--line);border-radius:999px;padding:4px}
  .tabs button{flex:1;border:0;background:transparent;color:var(--text-dim);font-weight:700;font-size:12px;padding:9px 4px;border-radius:999px;cursor:pointer}
  .tabs button.on{background:var(--accent);color:#06281a}
  .desc{font-size:12px;color:var(--text-dim);margin:0 2px 12px;line-height:1.45}.desc b{color:var(--text)}
  .head{margin:4px 2px 12px}.head h1{font-size:23px;margin:0 0 2px}.head p{margin:0;color:var(--text-dim);font-size:13px}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .mc{background:var(--card-grad);border:1px solid var(--line);border-radius:14px;padding:12px}
  .mc__t{font-size:11px;color:var(--text-dim);font-weight:700;letter-spacing:.3px;display:flex;align-items:center;gap:5px}
  .mc__v{font-size:24px;font-weight:800;margin-top:3px}.mc__v small{font-size:12px;color:var(--text-dim);font-weight:600;margin-left:3px}
  .mc__d{font-size:11px;font-weight:700;margin-top:1px}.up{color:var(--accent)}.down{color:#ff7a90}.flat{color:var(--text-dim)}
  svg.spark{display:block;width:100%;height:34px;margin-top:8px}
  .mc__h{font-size:10.5px;color:var(--text-dim);margin-top:7px;line-height:1.35}
  .full{grid-column:1 / -1}
  .section{font-size:12px;font-weight:800;letter-spacing:.4px;text-transform:uppercase;color:var(--text-dim);margin:16px 2px 8px}
  .bigcard{background:var(--card-grad);border:1px solid var(--line);border-radius:16px;padding:14px}
  .bigcard h3{margin:0 0 2px;font-size:15px}.bigcard .sub{font-size:12px;color:var(--text-dim);margin-bottom:8px}
  .area{width:100%;height:88px}
  .stat3{display:flex;gap:8px;margin-top:10px}
  .stat3 div{flex:1;text-align:center;background:#14181f;border:1px solid var(--line);border-radius:10px;padding:8px 4px}
  .stat3 b{display:block;font-size:19px}.stat3 span{font-size:10px;color:var(--text-dim)}
  .pill{display:inline-flex;gap:5px;align-items:center;font-size:10px;font-weight:700;color:var(--blue);border:1px solid rgba(94,200,255,.35);border-radius:999px;padding:2px 7px}
</style></head>
<body><div class="phone">
  <div class="tabs">
    <button class="on" onclick="show('wellness',this)">a · Wellness page</button>
    <button onclick="show('fitness',this)">b · Fitness split</button>
    <button onclick="show('mind',this)">c · Mind page</button>
  </div>
  <div id="desc" class="desc"></div>
  <div id="content"></div>
</div>
<script>
function spark(data,color){
  const w=120,h=34,mn=Math.min(...data),mx=Math.max(...data),rng=(mx-mn)||1;
  const pts=data.map((v,i)=>`${(i/(data.length-1)*w).toFixed(1)},${(h-((v-mn)/rng)*h).toFixed(1)}`).join(' ');
  return `<svg class="spark" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none"><polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2" vector-effect="non-scaling-stroke"/></svg>`;
}
function area(data,color){
  const w=300,h=88,mn=Math.min(...data),mx=Math.max(...data),rng=(mx-mn)||1;
  const pts=data.map((v,i)=>`${(i/(data.length-1)*w).toFixed(1)},${(h-((v-mn)/rng)*h*0.9-4).toFixed(1)}`);
  const line=pts.join(' ');const fill=`0,${h} ${line} ${w},${h}`;
  return `<svg class="area" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none"><polygon points="${fill}" fill="${color}22"/><polyline points="${line}" fill="none" stroke="${color}" stroke-width="2" vector-effect="non-scaling-stroke"/></svg>`;
}
const mc=(t,v,unit,d,dcls,data,color,hint)=>`<div class="mc"><div class="mc__t">${t}</div><div class="mc__v">${v}<small>${unit}</small></div><div class="mc__d ${dcls}">${d}</div>${spark(data,color)}<div class="mc__h">${hint}</div></div>`;

const WELL=`<div class="head"><h1>Wellness</h1><p>Sleep · HRV · resting HR · weight — from intervals & your check-ins</p></div>
<div class="grid">
${mc('😴 SLEEP','7.4','h','▲ 0.3h vs avg','up',[6.8,7.1,6.5,7.9,7.2,7.6,7.4],'#5ec8ff','Avg this week vs your ~8h need')}
${mc('💓 HRV','62','ms','▲ above baseline','up',[55,58,54,60,63,59,62],'#34e07d','7-day trend vs your personal baseline')}
${mc('❤️ RESTING HR','48','bpm','▼ −2 bpm','up',[52,51,50,49,50,48,48],'#ff8fb1','Lower = more recovered')}
${mc('⚖️ WEIGHT','75.8','kg','▼ −0.4 kg','flat',[76.4,76.2,76.1,75.9,76,75.7,75.8],'#f0b145','Syncs from your device via intervals')}
</div>
<div class="section">Check-in trend (your 1–5)</div>
<div class="bigcard"><h3>Energy · Sleep · Freshness</h3><div class="sub">How you've rated the last 2 weeks</div>${area([3,3.5,3,4,3.5,4,4.5,4,3,3.5,4,4.5,4,4],'#34e07d')}</div>`;

const FIT=`<div class="head"><h1>Stats</h1><p>The two Stats cards now open FOCUSED views (was: both → /fitness)</p></div>
<div class="section">Global · Training load &amp; Form</div>
<div class="bigcard"><h3>Fitness / Fatigue / Form</h3><div class="sub">Whole-body load (CTL/ATL/TSB) — readiness</div>${area([40,42,45,44,48,50,52,49,53,55,54,57,56,58],'#34e07d')}
<div class="stat3"><div><b>58</b><span>Fitness (CTL)</span></div><div><b>49</b><span>Fatigue (ATL)</span></div><div><b>+9</b><span>Form (TSB)</span></div></div></div>
<div class="section">Cycling · Power &amp; FTP</div>
<div class="bigcard"><h3>Power curve · FTP · VO₂max <span class="pill">cycling</span></h3><div class="sub">Your best power by duration</div>${area([700,520,440,380,330,300,285,272,265,260],'#5ec8ff')}
<div class="stat3"><div><b>262</b><span>eFTP (W)</span></div><div><b>3.5</b><span>W/kg</span></div><div><b>~51</b><span>VO₂max est.</span></div></div></div>`;

const MIND=`<div class="head"><h1>Mind</h1><p>Meditation · yoga · pilates — minutes, sessions, streak</p></div>
<div class="stat3"><div><b>184</b><span>min this month</span></div><div><b>12</b><span>sessions</span></div><div><b>4🔥</b><span>day streak</span></div></div>
<div class="section">Minutes per week</div>
<div class="bigcard"><h3>Weekly minutes</h3><div class="sub">Last 8 weeks</div>${area([30,45,20,60,55,40,70,65],'#b98cff')}</div>
<div class="section">Recent sessions</div>
<div class="bigcard"><h3>🧘 Box breathing · 8 min</h3><div class="sub">Yesterday · calm</div></div>`;

const DESC={
 wellness:'<b>a — Wellness page (NEW).</b> The mockup\'s missing card becomes its own page: sleep / HRV / resting-HR / weight trends from intervals + your check-in trend. Reuses the Fitness page\'s chart style.',
 fitness:'<b>b — Fitness split.</b> Today both Stats cards ("Training load & Form" and "Cycling") route to /fitness. Split them into two focused views: a GLOBAL load/Form view and a CYCLING power/FTP/VO₂max view.',
 mind:'<b>c — Mind page (NEW).</b> Today the Mind card → /logs. Give it real stats: minutes, sessions, streak + a weekly-minutes trend.',
};
function show(m,btn){document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove('on'));btn.classList.add('on');
 document.getElementById('desc').innerHTML=DESC[m];document.getElementById('content').innerHTML={wellness:WELL,fitness:FIT,mind:MIND}[m];}
const init=(location.hash||'#wellness').slice(1);const idx={wellness:0,fitness:1,mind:2}[init]??0;
show(init,document.querySelectorAll('.tabs button')[idx]);
</script>
</body></html>
