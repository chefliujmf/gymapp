<!doctype html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Curve — fixed</title>
<style>
  body{background:#0f1216;color:#eef1f4;font:14px/1.5 -apple-system,BlinkMacSystemFont,sans-serif;padding:18px;display:flex;flex-direction:column;gap:20px;align-items:center}
  .card{background:linear-gradient(#21252f,#191c24);border:1px solid #262c37;border-radius:16px;padding:14px;width:380px}
  .t{font-size:13px;font-weight:700;margin-bottom:6px}
  .ins{font-size:12px;color:#9298a6;margin-top:6px}
  svg{width:100%;height:auto;display:block}
</style></head>
<body>
<div class="card"><div class="t">Running — your pace curve, fitted</div><div id="run"></div><div class="ins">Critical Speed 5:21/km is the sustainable floor, D′ 148 m the reserve above it. Threshold, TTE and zones read off this.</div></div>
<div class="card"><div class="t">Cycling — your power curve, fitted</div><div id="ride"></div><div class="ins">Critical Power 248 W is your aerobic ceiling; W′ 17.1 kJ the battery above it.</div></div>
<script>
function fmtPace(s){return Math.floor(s/60)+':'+String(Math.round(s%60)).padStart(2,'0')}
function smooth(xy){ if(xy.length<2) return ''; let d='M'+xy[0][0]+','+xy[0][1]; for(let i=1;i<xy.length;i++){const [x0,y0]=xy[i-1],[x1,y1]=xy[i];const cx=(x0+x1)/2;d+=' C'+cx+','+y0+' '+cx+','+y1+' '+x1+','+y1;} return d }
function curve({asymptote,reserve,fmt,unit,reserveLabel,anchors}){
  const W=344,padL=48,padR=12,padT=14,padB=22,height=168,plotW=W-padL-padR,plotH=height-padT-padB
  const sMin=180,sMax=3600,L=Math.log10(sMin),R=Math.log10(sMax)
  const lx=s=>padL+(Math.log10(Math.max(sMin,Math.min(sMax,s)))-L)/(R-L)*plotW
  const modelV=t=>asymptote+reserve/t
  const pts=Array.from({length:48},(_,i)=>{const t=Math.pow(10,L+(R-L)*i/47);return [t,modelV(t)]})
  const vs=pts.map(p=>p[1]),vMax=Math.max(...vs)*1.03,vMin=Math.min(asymptote,Math.min(...vs))*0.97
  const ly=v=>padT+(1-(v-vMin)/(vMax-vMin))*plotH
  const xy=pts.map(p=>[lx(p[0]),ly(p[1])])
  const cpY=ly(asymptote)
  const ticks=[[180,'3m'],[300,'5m'],[1200,'20m'],[3600,'60m']]
  const yTicks=Array.from({length:4},(_,i)=>vMin+(vMax-vMin)*(i+0.5)/4)
  let s=`<svg viewBox="0 0 ${W} ${height}" role="img">`
  for(const v of yTicks){s+=`<line x1="${padL}" y1="${ly(v)}" x2="${W-padR}" y2="${ly(v)}" stroke="#242a33"/><text x="${padL-6}" y="${ly(v)+3}" fill="#9298a6" font-size="9.5" text-anchor="end">${fmt(v)}</text>`}
  s+=`<line x1="${padL}" y1="${padT-4}" x2="${padL}" y2="${height-padB}" stroke="#333a45"/><line x1="${padL}" y1="${height-padB}" x2="${W-padR}" y2="${height-padB}" stroke="#333a45"/>`
  s+=`<clipPath id="c"><rect x="${padL}" y="${padT-4}" width="${plotW}" height="${Math.max(0,cpY-(padT-4))}"/></clipPath>`
  s+=`<path d="M${xy[0][0]},${xy[0][1]} ${xy.map(p=>'L'+p[0]+','+p[1]).join(' ')} L${xy[xy.length-1][0]},${cpY} L${xy[0][0]},${cpY} Z" fill="rgba(155,140,255,.12)" clip-path="url(#c)"/>`
  s+=`<line x1="${padL}" y1="${cpY}" x2="${W-padR}" y2="${cpY}" stroke="#9b8cff" stroke-width="1.3" stroke-dasharray="5 4"/>`
  s+=`<text x="${W-padR}" y="${cpY-4}" fill="#9b8cff" font-size="10" text-anchor="end" font-weight="700">${fmt(asymptote)}${unit}</text>`
  s+=`<path d="${smooth(xy)}" fill="none" stroke="#34e07d" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>`
  for(const a of anchors){const v=modelV(a);s+=`<circle cx="${lx(a)}" cy="${ly(v)}" r="3" fill="#34e07d"/>`}
  s+=`<text x="${lx(480)}" y="${Math.max(padT+11,cpY-12)}" fill="#9b8cff" font-size="10" font-weight="700" text-anchor="middle">${reserveLabel}</text>`
  for(const [t,l] of ticks){s+=`<text x="${lx(t)}" y="${height-6}" fill="#9298a6" font-size="10" text-anchor="middle">${l}</text>`}
  return s+'</svg>'
}
document.getElementById('run').innerHTML=curve({asymptote:3.1174,reserve:148,fmt:v=>fmtPace(Math.round(1000/v)),unit:'/km',reserveLabel:"D′ 148 m",anchors:[300,1200]})
document.getElementById('ride').innerHTML=curve({asymptote:248,reserve:17100,fmt:v=>String(Math.round(v)),unit:' W',reserveLabel:"W′ 17.1 kJ",anchors:[300,1200]})
</script>
</body></html>
