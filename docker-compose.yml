# Platyplus (gymapp): auth + static SPA + intervals.icu proxy, one Node container.
# Reproducible recipe for what used to be a manual `docker run`.
# Update the app = rsync new dist/ then `docker compose restart` (no rebuild
# unless server/ changes, then `docker compose up -d --build`).
services:
  gymapp:
    build:
      context: ./server
    image: gymapp-auth
    container_name: gymapp
    restart: unless-stopped
    env_file:
      - "./auth.env"          # RP_ID, ORIGIN, SEED_* — secrets, not in git
    environment:
      CATALOG_DIR: /catalog   # exercise catalog for the coach API /api/exercises search
    volumes:
      - "./dist:/usr/share/nginx/html:ro"
      - "./media:/srv/media:ro"   # self-hosted media — served at /media/* by server.js
      - "./data:/data"        # store.json (accounts/passkeys) — backed up
      - "/home/jmf/content/generated:/catalog:ro"   # synced generated catalog (read-only)
    ports:
      - "8088:80"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/auth/config >/dev/null 2>&1 || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 10s
