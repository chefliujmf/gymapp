# Platyplus (gymapp): auth + static SPA + intervals.icu proxy, one Node container.
# Reproducible recipe for what used to be a manual `docker run`.
# Update the app = rsync new dist/ then `docker compose restart` (no rebuild
# unless server/ changes, then `docker compose up -d --build`).
services:
  gymapp:
    build:
      context: ./server
    image: gymapp-auth
    container_name: gymapp
    restart: unless-stopped
    env_file:
      - "./auth.env"          # RP_ID, ORIGIN, SEED_* — secrets, not in git
    environment:
      CATALOG_DIR: /catalog   # exercise catalog for the coach API /api/exercises search
      # Coach chat: proxy to the host chat-helper (claude can't run in this Alpine
      # container). Prod has its own helper instance on 8791 -> Coach API on 8088.
      # CHAT_HELPER_SECRET comes from auth.env.
      CHAT_HELPER_URL: http://host.docker.internal:8791
      # Postgres store (relational). First boot auto-migrates the legacy /data/store.json.
      DATABASE_URL: postgres://platyplus:${PG_PASSWORD:-platyplus}@db:5432/platyplus
    depends_on:
      db:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - "./dist:/usr/share/nginx/html:ro"
      - "./media:/srv/media:ro"   # self-hosted media — served at /media/* by server.js
      - "./data:/data"        # store.json (accounts/passkeys) — backed up
      - "/home/jmf/content/generated:/catalog:ro"   # synced generated catalog (read-only)
    ports:
      - "8088:80"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/auth/config >/dev/null 2>&1 || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 30s

  db:
    image: postgres:16-alpine
    container_name: gymapp-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: platyplus
      POSTGRES_USER: platyplus
      POSTGRES_PASSWORD: ${PG_PASSWORD:-platyplus}
    volumes:
      - "./pgdata:/var/lib/postgresql/data"   # relational store — backed up via pg_dump
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U platyplus -d platyplus"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
