name: CI

# Validate the app: compile (catalog gen + independence gate + tsc + vite build);
# the scraped catalog isn't in the repo, so the build runs against empty stubs —
# enough to catch type/build/Dockerfile-COPY breakage. Content correctness is
# validated at deploy time.
#
# Runs on PRs into main, AND is called as the pre-deploy GATE by deploy.yml and
# deploy-staging.yml (workflow_call) — so a deploy never runs on a red build.
on:
  pull_request:
    branches: [main]
  workflow_call: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      # Build the server image and prove its module graph resolves inside the
      # container — catches a Dockerfile that forgets to COPY an imported file
      # (which previously only surfaced as a prod crash-loop at deploy time).
      - name: Build + smoke-test server image
        run: |
          docker build -t gymapp-server-ci server/
          docker run --rm --entrypoint node gymapp-server-ci -e "import('./server.js').then(()=>{console.log('server module graph OK');process.exit(0)}).catch(e=>{console.error('IMPORT FAIL:',e.message);process.exit(e.code==='ERR_MODULE_NOT_FOUND'?1:0)})"
