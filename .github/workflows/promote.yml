name: Auto-promote to prod

# Zero-click promotion: when "Deploy Staging" finishes SUCCESSFULLY on `dev`
# (CI green + QA stack built and healthchecked), merge that commit into `main`
# (a --no-ff merge, mirroring the old PR-merge history — main carries merge
# commits, so a fast-forward isn't possible). The push to `main` then triggers
# deploy.yml, which re-runs the full CI gate and deploys PROD. Net effect: a
# healthy QA deploy auto-promotes to prod with no PR and no manual step.
#
# Safety:
#  - Only fires on a *successful* staging deploy (the `if` below), so a red CI
#    or a failed QA deploy never reaches prod.
#  - deploy.yml runs CI again as the prod gate before touching the box.
#  - Kill switch: set repo variable AUTO_PROMOTE=off (Settings → Secrets and
#    variables → Actions → Variables) to pause auto-promotion without code changes.
#  - workflow_dispatch lets you force a promote manually.
on:
  workflow_run:
    workflows: ["Deploy Staging"]
    types: [completed]
    branches: [dev]
  workflow_dispatch: {}

concurrency:
  group: promote-prod
  cancel-in-progress: false

jobs:
  promote:
    # Manual runs always proceed; automatic runs only on a successful staging deploy.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
      - name: Merge the passed commit into main and push
        run: |
          if [ "${{ vars.AUTO_PROMOTE }}" = "off" ]; then
            echo "AUTO_PROMOTE=off — auto-promotion paused, skipping."
            exit 0
          fi
          git config user.name "platyplus-promote-bot"
          git config user.email "actions@github.com"
          git fetch origin dev
          # Promote the exact commit that passed staging (head_sha); fall back to
          # dev's tip for manual dispatch.
          TARGET="${{ github.event.workflow_run.head_sha || 'origin/dev' }}"
          echo "Promoting $TARGET -> main"
          if git merge-base --is-ancestor "$TARGET" HEAD; then
            echo "Already on main — nothing to promote."; exit 0
          fi
          # main is built from --no-ff merges of dev with no direct edits, so this
          # merge is conflict-free. If it ever conflicts (someone hotfixed main),
          # fail loudly rather than guess.
          git merge --no-ff "$TARGET" -m "Auto-promote dev -> main ($TARGET)"
          git push origin HEAD:main
